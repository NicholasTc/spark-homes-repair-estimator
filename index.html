<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spark Estimator" />
  <meta name="theme-color" content="#0f172a" />
  <title>Spark Homes Estimator</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { brand: { DEFAULT:'#ea580c', dark:'#c2410c', light:'#fed7aa', faint:'#fff7ed' } },
        fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','Segoe UI','Helvetica Neue','sans-serif'] },
      }}
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    *{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
    html,body{height:100%;height:100dvh;overscroll-behavior:none;overflow:hidden}
    body{margin:0;background:#f1f5f9}
    /* iOS standalone/home-screen mode doesn't always resolve height:100%
       to the true visible viewport (varies by device/orientation) —
       leaving a gap below fixed-bottom UI like the nav bar. --app-vh is
       set from real window.innerHeight in JS below and takes priority. */
    #app{height:100%;height:100dvh;height:var(--app-vh, 100dvh)}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    .scroll-y{overflow-y:auto;-webkit-overflow-scrolling:touch}
    .safe-bottom{padding-bottom:max(16px,env(safe-area-inset-bottom))}
    .safe-top{padding-top:max(0px,env(safe-area-inset-top))}
    .pt-safe{padding-top:max(0px,env(safe-area-inset-top))}
    #side-panel{transition:transform .28s cubic-bezier(.4,0,.2,1)}
    .sheet{transition:transform .3s cubic-bezier(.4,0,.2,1);transform:translateY(100%)}
    .sheet.open{transform:translateY(0)}
    .fade-in{animation:fadeIn .18s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .progress-bar-fill{transition:width .4s ease}
    .drag-handle{touch-action:none}
    .room-order-card{will-change:transform}
    .badge-pulse{animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .drag-over{border:2px dashed #ea580c !important}
    input:focus,textarea:focus,select:focus{outline:none}
    .tab-active svg,.tab-active span{color:#ea580c}
    .item-row-enter{animation:rowEnter .2s ease}
    @keyframes rowEnter{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

    /* Tactile press feedback — applies to every button and every
       onclick-driven element (this app uses plain divs as tap targets in
       a lot of places, e.g. cards), so tapping anything gives an obvious
       "this registered" signal instead of the flat, unresponsive feel you
       get once the native tap-highlight is disabled above. */
    button,a,[onclick]{transition:transform .12s ease,opacity .12s ease}
    button:not(:disabled):active,
    a:active,
    [onclick]:not(input):not(textarea):not(select):active{
      transform:scale(0.96);
      opacity:.72;
    }
  </style>
</head>

<script>
// iOS home-screen/standalone mode doesn't reliably resolve CSS height:100%
// (or even 100dvh, on some versions) to the actual visible viewport — this
// leaves a gap below fixed-bottom UI like the bottom nav on some devices
// (observed on iPhone SE). Measuring window.innerHeight directly and
// pushing it into a CSS variable is the most reliable fix regardless of
// device/orientation/iOS version, since it uses the real, current value
// instead of a CSS unit that WebKit may compute differently. Runs before
// first render so there's no flash of the wrong height, and re-syncs on
// resize/orientation change (covers rotating the phone, and Safari's
// dynamic toolbar in non-standalone testing).
function syncAppHeight() {
  const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  document.documentElement.style.setProperty('--app-vh', h + 'px');
}
syncAppHeight();
window.addEventListener('resize', syncAppHeight);
window.addEventListener('orientationchange', () => setTimeout(syncAppHeight, 60));
if (window.visualViewport) window.visualViewport.addEventListener('resize', syncAppHeight);

const SK = 'spark_v2';
const SK_GLOBAL = 'spark_globals_v2';
const SK_SORT = 'spark_dashboard_sort_v1';

let state = {
  view: 'dashboard',
  activeProjectId: null,
  activeRoomId: null,
  activeGroupKey: null,
  projects: [],
  globalPriceOverrides: {},
  // transient context (not persisted)
  _pendingPriceItem: null,
  _pendingPhotoCtx: null,
  _ocrCtx: null,
};

function loadState() {
  try {
    const raw = localStorage.getItem(SK);
    const globals = localStorage.getItem(SK_GLOBAL);
    if (raw) {
      const saved = JSON.parse(raw);
      state.projects = saved.projects || [];
      state.activeProjectId = saved.activeProjectId || null;
      state.view = saved.view || 'dashboard';
      state.activeRoomId = saved.activeRoomId || null;
      state.activeGroupKey = saved.activeGroupKey || null;
    }
    if (globals) {
      const g = JSON.parse(globals);
      state.globalPriceOverrides = g.priceOverrides || {};
    }
  } catch(e) { console.error('loadState:', e); }
}

function stripPhotosFromProject(p) {
  return {
    ...p, rooms: p.rooms.map(r => ({
      ...r, groups: r.groups.map(g => ({
        ...g, items: g.items.map(i => ({ ...i, photos:[] })),
        groupPhotos: [],
      }))
    }))
  };
}

function saveState() {
  try {
    const toSave = {
      projects: state.projects,
      activeProjectId: state.activeProjectId,
      view: state.view,
      activeRoomId: state.activeRoomId,
      activeGroupKey: state.activeGroupKey,
    };
    try {
      localStorage.setItem(SK, JSON.stringify(toSave));
    } catch(e) {
      // Storage quota exceeded. First, try dropping photos from only the
      // project currently being worked on (least destructive) — other
      // projects' photos are left untouched.
      const activeId = state.activeProjectId;
      const scoped = { ...toSave, projects: state.projects.map(p =>
        p.id === activeId ? stripPhotosFromProject(p) : p
      ) };
      try {
        localStorage.setItem(SK, JSON.stringify(scoped));
        state.projects = scoped.projects;
        showToast('Storage is nearly full — photos for the current project could not be saved. Export this project soon to back up your data, or delete older projects to free up space.');
      } catch(e2) {
        // Still over quota — fall back to stripping photos from every project.
        const stripped = { ...toSave, projects: state.projects.map(stripPhotosFromProject) };
        localStorage.setItem(SK, JSON.stringify(stripped));
        state.projects = stripped.projects;
        showToast('Storage is full — photos across all projects could not be saved. Export your projects now to avoid losing photo data, then delete old projects to free up space.');
      }
    }
    localStorage.setItem(SK_GLOBAL, JSON.stringify({ priceOverrides: state.globalPriceOverrides }));
  } catch(e) { console.error('saveState:', e); }
}

let _toastTimer = null;
function showToast(msg) {
  const banner = document.getElementById('toast-banner');
  const msgEl = document.getElementById('toast-banner-msg');
  if (!banner || !msgEl) return;
  msgEl.textContent = msg;
  banner.classList.remove('hidden');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(hideToast, 10000);
}
function hideToast() {
  document.getElementById('toast-banner')?.classList.add('hidden');
  clearTimeout(_toastTimer);
}

function setState(patch, skipRender) {
  Object.assign(state, patch);
  saveState();
  if (!skipRender) render();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(n) { return '$' + (n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

async function compressPhoto(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        const r = Math.min(MAX / img.width, MAX / img.height, 1);
        const c = document.createElement('canvas');
        c.width = Math.round(img.width * r);
        c.height = Math.round(img.height * r);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', 0.65));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Dedicated OCR-quality render, kept separate from the small compressed copy
// used for storage/display. Nameplates pack a lot of small dense text, so
// the 900px/0.65-quality storage photo is too degraded for Tesseract to read
// reliably. This keeps far more resolution and applies a grayscale contrast
// stretch, which makes engraved/printed text edges much crisper for OCR
// without the file-size cost of storing it.
async function preprocessForOCR(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 2000;
        const r = Math.min(MAX / img.width, MAX / img.height, 1);
        const w = Math.max(1, Math.round(img.width * r));
        const h = Math.max(1, Math.round(img.height * r));
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        try {
          const imgData = ctx.getImageData(0, 0, w, h);
          const d = imgData.data;
          const gray = new Float32Array(w * h);
          let min = 255, max = 0;
          for (let i = 0, j = 0; i < d.length; i += 4, j++) {
            const g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
            gray[j] = g;
            if (g < min) min = g;
            if (g > max) max = g;
          }
          const range = Math.max(1, max - min);
          for (let i = 0, j = 0; i < d.length; i += 4, j++) {
            const v = ((gray[j] - min) / range) * 255;
            d[i] = d[i + 1] = d[i + 2] = v;
          }
          ctx.putImageData(imgData, 0, 0);
        } catch (e) {
          // If pixel access fails for any reason, fall back to the plain
          // high-res color render — still better than the tiny storage copy.
        }
        resolve(c.toDataURL('image/png'));
      };
      img.onerror = () => reject(new Error('image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}

let tesseractLoaded = false;
let _ocrWorkerPromise = null;
async function getOcrWorker() {
  if (!_ocrWorkerPromise) {
    _ocrWorkerPromise = (async () => {
      if (!tesseractLoaded) {
        await new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
          s.onload = res; s.onerror = () => rej(new Error('tesseract script failed to load'));
          document.head.appendChild(s);
        });
        tesseractLoaded = true;
      }
      const worker = await Tesseract.createWorker('eng');
      // Nameplates are a scattered grid of short text blocks, not a
      // paragraph, so SPARSE_TEXT (mode 11) reads each label/value pair
      // independently instead of trying to reflow everything into one
      // column. Restricting the charset to what serials/labels actually use
      // stops Tesseract from "reading" scratches, screws and icons as
      // symbols like ©, |, = — the main source of the garbled output.
      await worker.setParameters({
        tessedit_pageseg_mode: '11',
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-/:. ',
        preserve_interword_spaces: '1',
        user_defined_dpi: '300',
      });
      return worker;
    })();
    _ocrWorkerPromise.catch(() => { _ocrWorkerPromise = null; });
  }
  return _ocrWorkerPromise;
}

async function runOCR(dataUrl) {
  try {
    const worker = await getOcrWorker();
    const { data: { text } } = await worker.recognize(dataUrl);
    return text;
  } catch (e) {
    // Not fatal — likely offline with assets not yet cached, or a transient
    // OCR failure. Reset the worker so the next attempt starts fresh, and
    // fail silently; the user can still enter the serial number manually.
    _ocrWorkerPromise = null;
    return null;
  }
}

// Labels that mark the line as belonging to a *different* nameplate field
// (model, date of manufacture, breaker size, etc). Used to avoid mistaking
// those values for the serial number.
const SERIAL_BLACKLIST_RE = /\b(model|mod\.?|mfg|manufactur|date|mfd|voltage|phase|freq|refrigerant|factory\s*charge|circuit|breaker|ampacity|\bamp\b|pressure|\brla\b|\blra\b|\bfla\b|btu|weight|part\s*no|p\/n|barcode|installer|patent|warranty|made\s*in|country|catalog|cat\.?\s*no|psig|lbs|kg)\b/i;
// Covers "Serial", "Serial No.", "Serial Number", "Serial#", the common
// abbreviation "Ser./Ser No.", and "S/N" / "SN".
const SERIAL_LABEL_RE = /\b(?:serial\s*(?:no\.?|number|#)?|ser\.?\s*(?:no\.?|number|#)|s\/?n)\b/i;
// Words that are part of the *label*, not the value — stripped iteratively
// so wrapped labels like "SERIAL" / "NUMBER: XYZ123" (split across two OCR
// lines) still resolve to just "XYZ123".
const LEADING_LABEL_WORDS_RE = /^(?:serial|ser|number|num|no\.?|name|plate|s\/?n)\b[:#\-.]*\s*/i;

function stripLeadingLabelWords(str) {
  let s = String(str || '').trim().replace(/^[\s:#\-.]+/, '');
  for (let i = 0; i < 3; i++) {
    const before = s;
    s = s.replace(LEADING_LABEL_WORDS_RE, '').replace(/^[\s:#\-.]+/, '');
    if (s === before) break;
  }
  return s.trim();
}

function cleanSerialToken(raw) {
  // Strip anything that isn't a letter/digit/dash/slash. This is what
  // eliminates OCR noise characters (©, ®, |, =, ~, curly quotes, etc.) that
  // used to leak straight into the "detected" serial number.
  return String(raw || '').replace(/[^A-Za-z0-9\-\/]/g, '').toUpperCase();
}

function isPlausibleSerial(token, minLength) {
  if (!token) return false;
  if (token.length < minLength || token.length > 24) return false;
  if (!/[0-9]/.test(token)) return false; // real serials virtually always contain a digit
  if (/^0+$/.test(token)) return false;
  if (/^(.)\1+$/.test(token)) return false; // e.g. "IIIIIIII" — a scan artifact, not a code
  return true;
}

// Returns every plausible serial-number reading found in OCR text, ranked
// best-first, so the UI can offer the top guess plus a couple of
// alternatives instead of trusting a single fragile regex match.
function extractSerialCandidates(text) {
  if (!text) return [];
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const candidates = [];
  const seen = new Set();

  // Candidates found next to a recognized label ("Serial", "S/N", ...) are
  // trusted more, so they're allowed to be shorter (real serials can be as
  // short as 3-4 characters). Unlabeled fallback guesses need to look more
  // like a real code to avoid grabbing random OCR noise.
  function addCandidate(raw, score, minLength) {
    const cleaned = cleanSerialToken(raw);
    if (!isPlausibleSerial(cleaned, minLength) || seen.has(cleaned)) return;
    seen.add(cleaned);
    candidates.push({ value: cleaned, score });
  }

  lines.forEach((line, idx) => {
    const labelMatch = line.match(SERIAL_LABEL_RE);
    if (!labelMatch) return;
    // Handle "SERIAL NUMBER: SN: NCS2607X91438" (repeated/nested labels) and
    // a label that wraps to its own OCR line ("SERIAL" / "NUMBER: XYZ123")
    // by looking ahead up to two lines until something is left after
    // stripping every leading label word.
    let valuePart = stripLeadingLabelWords(line.slice(labelMatch.index + labelMatch[0].length));
    let lookIdx = idx;
    while (!valuePart && lookIdx < lines.length - 1 && lookIdx < idx + 2) {
      lookIdx++;
      valuePart = stripLeadingLabelWords(lines[lookIdx]);
    }
    const tokens = valuePart.split(/\s+/).filter(Boolean);
    if (tokens.length === 1) {
      addCandidate(tokens[0], 100, 3);
    } else if (tokens.length >= 2 && tokens.length <= 3 && tokens.every(t => t.length <= 12)) {
      // OCR sometimes splits one code across whitespace — try the joined
      // reading first, but keep the first token as a fallback in case the
      // trailing tokens actually belong to the next field.
      addCandidate(tokens.join(''), 100, 3);
      addCandidate(tokens[0], 85, 3);
    } else if (tokens.length > 0) {
      // Several tokens with at least one long one usually means other
      // fields got merged onto this line — take just the first token.
      addCandidate(tokens[0], 95, 3);
    }
  });

  // Fallback: scan remaining lines for a standalone alphanumeric code shaped
  // like a typical serial, skipping any line that clearly belongs to
  // another labeled field (model, date, pressure rating, etc).
  lines.forEach(line => {
    if (SERIAL_LABEL_RE.test(line) || SERIAL_BLACKLIST_RE.test(line)) return;
    const m = line.match(/\b([A-Z0-9][A-Z0-9\-\/]{4,20})\b/i);
    if (m) addCandidate(m[1], 40, 5);
  });

  return candidates.sort((a, b) => b.score - a.score);
}

function parseSerial(text) {
  const candidates = extractSerialCandidates(text);
  return candidates.length ? candidates[0].value : null;
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return 'just now';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

function formatDuration(ms) {
  if (!ms) return '';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h ${m % 60}m`;
  return `${m}m`;
}

// ═══════════════════════════════════════════════════════════════════════════
// 4. PROJECT & DATA HELPERS
// ═══════════════════════════════════════════════════════════════════════════

function navigate(view, extra = {}) {
  // Reorder mode is a transient editing state scoped to the walkthrough
  // room list — leaving that screen should always drop back to normal
  // browsing so it doesn't silently resurface elsewhere.
  const reorderMode = view === 'walkthrough' ? state.reorderMode : false;
  setState({ view, reorderMode, ...extra });
}

function activeProject() {
  return state.projects.find(p => p.id === state.activeProjectId) || null;
}

function getEffectivePrice(itemId, project) {
  if (project?.priceOverrides?.[itemId] !== undefined) return project.priceOverrides[itemId];
  if (state.globalPriceOverrides[itemId] !== undefined) return state.globalPriceOverrides[itemId];
  return CATALOG[itemId]?.cost ?? 0;
}

function isPriceOverridden(itemId, project) {
  return project?.priceOverrides?.[itemId] !== undefined || state.globalPriceOverrides[itemId] !== undefined;
}

function getProjectTotal(project) {
  if (!project) return 0;
  return project.rooms.reduce((sum, room) =>
    sum + room.groups.reduce((s, g) =>
      s + g.items.reduce((t, item) => t + (item.qty || 0) * (item.unitCost || 0), 0), 0), 0);
}

function getProgress(project) {
  if (!project) return { reviewed: 0, total: 0, pct: 0 };
  const allGroups = project.rooms.flatMap(r => r.groups);
  const total = allGroups.length;
  const reviewed = allGroups.filter(g => g.reviewed).length;
  return { reviewed, total, pct: total ? Math.round(reviewed / total * 100) : 0 };
}

// Finds the next room (in walkthrough order, wrapping around) that still has
// unreviewed groups — used to power the "Continue to [Room] →" CTA so agents
// are guided room-to-room instead of having to bounce back to the full list.
function getNextIncompleteRoom(project, currentRoomId) {
  const rooms = project.rooms;
  const idx = rooms.findIndex(r => r.id === currentRoomId);
  const isIncomplete = r => r.groups.some(g => !g.reviewed);
  for (let i = 1; i <= rooms.length; i++) {
    const candidate = rooms[(idx + i) % rooms.length];
    if (candidate.id !== currentRoomId && isIncomplete(candidate)) return candidate;
  }
  return null;
}

function goToRoom(roomId) {
  setState({ activeRoomId: roomId, activeGroupKey: null, view: 'room-groups' });
}

function getProjectStatus(project) {
  if (!project.walkthroughStartedAt) return { key:'not_started', label:'Not Started', classes:'bg-slate-100 text-slate-500' };
  const pct = getProgress(project).pct;
  if (pct >= 100) return { key:'complete', label:'Complete', classes:'bg-green-100 text-green-700' };
  return { key:'in_progress', label:'In Progress', classes:'bg-amber-100 text-amber-700' };
}

function createGroupState(groupKey) {
  return { key: groupKey, reviewed: false, noActionNeeded: false, items: [], groupPhotos: [] };
}

function createRoom(type, label, order) {
  const rt = ROOM_TYPE_MAP[type];
  return {
    id: uid(), type, label, order,
    condition: null,
    notes: '',
    groups: rt.groupKeys.map(k => createGroupState(k)),
  };
}

function setRoomNotes(projectId, roomId, notes) {
  updateProject(projectId, p => {
    const room = p.rooms.find(r => r.id === roomId);
    if (room) room.notes = notes;
  });
}

function setProjectNotes(projectId, notes) {
  updateProject(projectId, p => { p.notes = notes; });
}

function renameProject(projectId, newName) {
  const name = (newName || '').trim();
  if (!name) return;
  updateProject(projectId, p => { p.name = name; });
  render();
}

function createProject(name, address, roomConfigs) {
  const now = Date.now();
  const rooms = [];
  const counters = {};
  const sortedConfigs = [...roomConfigs].sort((a, b) => {
    const ao = ROOM_TYPE_MAP[a.type]?.walkthroughOrder || 99;
    const bo = ROOM_TYPE_MAP[b.type]?.walkthroughOrder || 99;
    return ao - bo;
  });
  sortedConfigs.forEach((cfg, idx) => {
    const rt = ROOM_TYPE_MAP[cfg.type];
    if (!rt) return;
    const count = (counters[cfg.type] = (counters[cfg.type] || 0) + 1);
    const label = rt.multi ? `${rt.label} ${count}` : rt.label;
    rooms.push(createRoom(cfg.type, label, idx));
  });
  return {
    id: uid(), name: name.trim(), address: (address||'').trim(),
    createdAt: now, updatedAt: now,
    rooms,
    priceOverrides: {},
    dealAnalyzer: { arv:0, targetProfit:30000, holdingCosts:18000, sellingCosts:0, purchasePrice:0 },
    notes: '',
    walkthroughStartedAt: null,
    walkthroughDuration: 0,
  };
}

function getRoomById(project, roomId) {
  return project?.rooms?.find(r => r.id === roomId);
}

function getGroupState(room, groupKey) {
  return room?.groups?.find(g => g.key === groupKey);
}

function getLineItemById(groupState, itemId) {
  return groupState?.items?.find(i => i.id === itemId);
}

function getSelectedCatalogItem(groupState, catalogId) {
  return groupState?.items?.find(i => i.catalogId === catalogId);
}

function updateProject(projectId, updater) {
  const idx = state.projects.findIndex(p => p.id === projectId);
  if (idx < 0) return;
  const p = deepClone(state.projects[idx]);
  updater(p);
  p.updatedAt = Date.now();
  state.projects[idx] = p;
  saveState();
}

function updateGroupStateIn(project, roomId, groupKey, updater) {
  const room = project.rooms.find(r => r.id === roomId);
  if (!room) return;
  const g = room.groups.find(g => g.key === groupKey);
  if (!g) return;
  updater(g, room);
}

// Toggle a catalog item in a group (check/uncheck)
function toggleItemInGroup(projectId, roomId, groupKey, catalogId) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const existing = getSelectedCatalogItem(g, catalogId);
      if (existing) {
        g.items = g.items.filter(i => i.catalogId !== catalogId);
      } else {
        const cat = CATALOG[catalogId];
        const eff = getEffectivePrice(catalogId, p);
        g.items.push({
          id: uid(), catalogId, name: cat.name, unit: cat.unit,
          qty: cat.defaultQty || 0, unitCost: eff,
          notes: '', photos: [], year: null, serialNumber: null, isCustom: false,
        });
      }
      g.noActionNeeded = false;
      g.reviewed = g.noActionNeeded || g.items.length > 0;
    });
  });
}

function setGroupNAN(projectId, roomId, groupKey, value) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      g.noActionNeeded = value;
      if (value) { g.items = []; g.reviewed = true; }
      else g.reviewed = false;
    });
  });
}

function setItemQty(projectId, roomId, groupKey, lineItemId, qty) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const item = g.items.find(i => i.id === lineItemId);
      if (item) { item.qty = parseFloat(qty) || 0; g.reviewed = true; }
    });
  });
}

function setItemNotes(projectId, roomId, groupKey, lineItemId, notes) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const item = g.items.find(i => i.id === lineItemId);
      if (item) item.notes = notes;
    });
  });
}

function setItemYear(projectId, roomId, groupKey, lineItemId, year) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const item = g.items.find(i => i.id === lineItemId);
      if (item) item.year = year;
    });
  });
}

function setRoomCondition(projectId, roomId, condition) {
  updateProject(projectId, p => {
    const room = p.rooms.find(r => r.id === roomId);
    if (room) room.condition = condition;
  });
}

function addPhotoToItem(projectId, roomId, groupKey, lineItemId, photo) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const item = g.items.find(i => i.id === lineItemId);
      if (item) item.photos.push(photo);
    });
  });
}

function addPhotoToGroup(projectId, roomId, groupKey, photo) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => { g.groupPhotos.push(photo); });
  });
}

function deletePhoto(projectId, roomId, groupKey, lineItemId, photoId) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      if (lineItemId === 'group') {
        g.groupPhotos = g.groupPhotos.filter(ph => ph.id !== photoId);
      } else {
        const item = g.items.find(i => i.id === lineItemId);
        if (item) item.photos = item.photos.filter(ph => ph.id !== photoId);
      }
    });
  });
}

function deleteLineItem(projectId, roomId, groupKey, lineItemId) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      g.items = g.items.filter(i => i.id !== lineItemId);
      g.reviewed = g.noActionNeeded || g.items.length > 0;
    });
  });
}

function duplicateProject(projectId) {
  const src = state.projects.find(p => p.id === projectId);
  if (!src) return;
  const copy = deepClone(src);
  copy.id = uid();
  copy.name = src.name + ' (Copy)';
  copy.createdAt = Date.now();
  copy.updatedAt = Date.now();
  // clear selections, keep room structure
  copy.rooms.forEach(r => {
    r.condition = null;
    r.groups.forEach(g => {
      g.reviewed = false; g.noActionNeeded = false;
      g.items = []; g.groupPhotos = [];
    });
  });
  copy.dealAnalyzer = { arv:0, targetProfit:30000, holdingCosts:18000, sellingCosts:0, purchasePrice:0 };
  copy.notes = '';
  copy.walkthroughStartedAt = null;
  copy.walkthroughDuration = 0;
  state.projects.push(copy);
  setState({ activeProjectId: copy.id, view:'walkthrough' });
}

// ═══════════════════════════════════════════════════════════════════════════
// 5. SPARKCHECK ENGINE
// ═══════════════════════════════════════════════════════════════════════════

function runSparkCheck(project) {
  if (!project) return [];
  const issues = [];
  const total = getProjectTotal(project);
  const bedroomCount = project.rooms.filter(r => r.type === 'bedroom').length;

  // Helper: find a room's group state
  const getGS = (roomType, groupKey) => {
    const room = project.rooms.find(r => r.type === roomType);
    return room ? getGroupState(room, groupKey) : null;
  };
  const getGSById = (roomId, groupKey) => {
    const room = project.rooms.find(r => r.id === roomId);
    return room ? getGroupState(room, groupKey) : null;
  };

  // ── Critical: Systems must be reviewed ──
  const hvac = getGS('systems', 'as:hvac');
  if (!hvac?.reviewed) issues.push({ level:'critical', msg:'HVAC not reviewed — furnace, A/C, and water heater can each cost $1,400–$4,700', roomType:'systems', groupKey:'as:hvac' });

  const elec = getGS('systems', 'as:electrical');
  if (!elec?.reviewed) issues.push({ level:'critical', msg:'Electrical not reviewed — full rewire can cost $5,000–$15,000+', roomType:'systems', groupKey:'as:electrical' });

  const struct = getGS('systems', 'as:structural');
  if (!struct?.reviewed) issues.push({ level:'critical', msg:'Structural not reviewed — foundation issues can cost $3,000–$30,000+', roomType:'systems', groupKey:'as:structural' });

  // ── Critical: Roof item selected without photos ──
  const roofItem = struct?.items?.find(i => i.catalogId === 'as-16');
  if (roofItem && roofItem.photos.length === 0) {
    issues.push({ level:'critical', msg:'Roof selected but no photos attached — photo each side required', roomType:'systems', groupKey:'as:structural' });
  }

  // ── Warning: HVAC items without serial photos ──
  if (hvac?.reviewed && !hvac.noActionNeeded) {
    const hvacItems = hvac.items || [];
    ['as-01','as-02','as-08'].forEach(catId => {
      const it = hvacItems.find(i => i.catalogId === catId);
      if (it) {
        if (it.photos.length === 0) issues.push({ level:'warning', msg:`${it.name} selected — serial number photo required`, roomType:'systems', groupKey:'as:hvac' });
        if (!it.year) issues.push({ level:'warning', msg:`${it.name} — year not recorded`, roomType:'systems', groupKey:'as:hvac' });
      }
    });
  }

  // ── Warning: Bathroom tub groups with no photos ──
  project.rooms.filter(r => r.type === 'bathroom').forEach(room => {
    const tub = getGroupState(room, 'ba:tub');
    if (tub?.items?.length > 0) {
      const hasPhoto = tub.items.some(i => i.photos.length > 0);
      if (!hasPhoto) issues.push({ level:'warning', msg:`${room.label}: Tub/Shower items selected — add a photo`, roomId: room.id, groupKey:'ba:tub' });
    }
    const tile = getGroupState(room, 'ba:tile');
    if (!tile?.reviewed) issues.push({ level:'warning', msg:`${room.label}: Tile group not reviewed`, roomId: room.id, groupKey:'ba:tile' });
  });

  // ── Warning: Kitchen appliances without photos ──
  const ktAppl = project.rooms.find(r => r.type === 'kitchen');
  if (ktAppl) {
    const applGroup = getGroupState(ktAppl, 'kt:appliances');
    if (applGroup?.items?.length > 0) {
      const hasPhoto = applGroup.items.some(i => i.photos.length > 0) || applGroup.groupPhotos?.length > 0;
      if (!hasPhoto) issues.push({ level:'warning', msg:'Kitchen appliances selected — add condition photos', roomId: ktAppl.id, groupKey:'kt:appliances' });
    }
  }

  // ── Warning: Items with qty = 0 ──
  project.rooms.forEach(room => {
    room.groups.forEach(g => {
      g.items.forEach(item => {
        if (item.qty === 0 && !item.isCustom) {
          issues.push({ level:'warning', msg:`"${item.name}" is checked but has no quantity`, roomId: room.id, groupKey: g.key });
        }
      });
    });
  });

  // ── Warning: Line total below catalog minimum ──
  project.rooms.forEach(room => {
    room.groups.forEach(g => {
      g.items.forEach(item => {
        const cat = item.catalogId ? CATALOG[item.catalogId] : null;
        if (cat?.min && item.qty > 0 && (item.qty * item.unitCost) < cat.min) {
          issues.push({ level:'warning', msg:`"${item.name}" in ${room.label} totals ${fmt(item.qty * item.unitCost)}, below the typical minimum of ${fmt(cat.min)}`, roomId: room.id, groupKey: g.key });
        }
      });
    });
  });

  // ── Info: Exterior photos missing ──
  const extRoom = project.rooms.find(r => r.type === 'exterior');
  if (extRoom) {
    const hasAnyExtPhoto = extRoom.groups.some(g => g.groupPhotos?.length > 0 || g.items.some(i => i.photos.length > 0));
    if (!hasAnyExtPhoto) issues.push({ level:'info', msg:'No exterior photos attached', roomId: extRoom.id });
  }

  // ── Info: Rooms added but not started ──
  project.rooms.forEach(room => {
    const allUnreviewed = room.groups.every(g => !g.reviewed);
    if (allUnreviewed) issues.push({ level:'info', msg:`${room.label} not started`, roomId: room.id });
  });

  // ── Info: Estimate seems low for property size ──
  if (bedroomCount >= 3 && total < 12000 && total > 0) {
    issues.push({ level:'info', msg:`Estimate of ${fmt(total)} seems low for a ${bedroomCount}-bed property — typical range $25k–$65k` });
  }

  return issues;
}

// ═══════════════════════════════════════════════════════════════════════════
// 6. DEAL ANALYZER
// ═══════════════════════════════════════════════════════════════════════════

function analyzeDeal(project) {
  if (!project) return null;
  const da = project.dealAnalyzer || {};
  const repair = getProjectTotal(project);
  const arv = da.arv || 0;
  const targetProfit = da.targetProfit || 0;
  const holdingCosts = da.holdingCosts || 0;
  const sellingCosts = da.sellingCosts || 0;
  const purchasePrice = da.purchasePrice || 0;

  const maxOffer = arv - repair - targetProfit - holdingCosts - sellingCosts;
  const estimatedProfit = arv - purchasePrice - repair - holdingCosts - sellingCosts;
  const redThreshold = arv - targetProfit - holdingCosts - sellingCosts; // max repair budget before red

  let confidence = 'red';
  if (estimatedProfit >= targetProfit) confidence = 'green';
  else if (estimatedProfit >= 0) confidence = 'yellow';

  return { repair, arv, maxOffer, estimatedProfit, targetProfit, redThreshold, confidence };
}

// Single source of truth for "what's going on with this project" — feeds
// both the dashboard summary sheet and the export summary.txt, so the two
// never drift out of sync on numbers or tone.
function buildProjectSummaryData(project) {
  const prog = getProgress(project);
  const total = getProjectTotal(project);
  const status = getProjectStatus(project);
  const issues = runSparkCheck(project);
  const critIssues = issues.filter(i => i.level === 'critical');
  const warnIssues = issues.filter(i => i.level === 'warning');
  const deal = analyzeDeal(project);
  const hasDealInputs = !!(project.dealAnalyzer?.arv > 0);
  let photoCount = 0;
  project.rooms.forEach(r => r.groups.forEach(g => {
    photoCount += (g.groupPhotos?.length || 0);
    g.items.forEach(it => { photoCount += (it.photos?.length || 0); });
  }));
  return { project, prog, total, status, issues, critIssues, warnIssues, deal, hasDealInputs, photoCount };
}

// Plain-English sentences, not a labeled data dump — written to read like a
// quick note from a colleague, not a generated report. Used verbatim in the
// dashboard summary sheet, and prepended to the export's summary.txt.
function buildProjectSummarySentences(data) {
  const { project, prog, total, status, critIssues, warnIssues, deal, hasDealInputs, photoCount } = data;
  const sentences = [];

  if (status.key === 'not_started') {
    sentences.push(`${project.name} hasn't been walked yet — no groups reviewed so far.`);
  } else if (status.key === 'complete') {
    sentences.push(`${project.name} is fully walked through and comes in at ${fmt(total)}.`);
  } else {
    sentences.push(`${project.name} is ${prog.pct}% through the walkthrough (${prog.reviewed}/${prog.total} groups reviewed), with ${fmt(total)} in repairs estimated so far.`);
  }

  if (critIssues.length > 0) {
    const top = critIssues.slice(0, 2).map(i => i.msg);
    const remaining = critIssues.length - top.length;
    const extra = remaining > 0 ? ` ${remaining} more critical item${remaining > 1 ? 's' : ''} still need${remaining === 1 ? 's' : ''} a look.` : '';
    sentences.push(`${critIssues.length} critical thing${critIssues.length > 1 ? 's' : ''} need${critIssues.length === 1 ? 's' : ''} attention: ${top.join('. Also, ')}.${extra}`);
  } else if (warnIssues.length > 0) {
    sentences.push(`No critical risks, but ${warnIssues.length} smaller item${warnIssues.length > 1 ? 's' : ''} could use a second look.`);
  } else if (status.key !== 'not_started') {
    sentences.push(`No risks flagged — SparkCheck looks clean.`);
  }

  if (hasDealInputs && deal) {
    const confidenceWord = { green: 'looks solid', yellow: 'is workable but tight', red: 'is a stretch at these numbers' }[deal.confidence] || 'is set up';
    sentences.push(`Based on your deal inputs, this ${confidenceWord} — max offer lands around ${fmt(deal.maxOffer || 0)}.`);
  }

  if (photoCount > 0 && status.key !== 'not_started') {
    sentences.push(`${photoCount} photo${photoCount > 1 ? 's' : ''} captured across ${project.rooms.length} room${project.rooms.length > 1 ? 's' : ''}.`);
  }

  return sentences;
}

// 7. EXPORT ENGINE (Excel + ZIP)
// ═══════════════════════════════════════════════════════════════════════════

function buildExcel(project) {
  const wb = XLSX.utils.book_new();
  const deal = analyzeDeal(project);

  // ── Summary Sheet ──
  const summaryRows = [
    ['SPARK HOMES — REPAIR ESTIMATE'],
    [],
    ['Project', project.name],
    ['Address', project.address || '—'],
    ['Date', new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' })],
    ['Total Estimate', getProjectTotal(project)],
    ...(project.notes && project.notes.trim() ? [[], ['Project Notes', project.notes.trim()]] : []),
    [],
    ['DEAL ANALYZER'],
    ['ARV', project.dealAnalyzer?.arv || 0],
    ['Repair Estimate', getProjectTotal(project)],
    ['Target Profit', project.dealAnalyzer?.targetProfit || 0],
    ['Holding Costs', project.dealAnalyzer?.holdingCosts || 0],
    ['Selling Costs', project.dealAnalyzer?.sellingCosts || 0],
    ['Purchase Price', project.dealAnalyzer?.purchasePrice || 0],
    [],
    ['Max Offer', deal?.maxOffer || 0],
    ['Estimated Profit', deal?.estimatedProfit || 0],
    ['Deal Confidence', (deal?.confidence || 'N/A').toUpperCase()],
  ];
  const summarySheet = XLSX.utils.aoa_to_sheet(summaryRows);
  summarySheet['!cols'] = [{ wch: 24 }, { wch: 20 }];
  XLSX.utils.book_append_sheet(wb, summarySheet, 'Summary');

  // ── One sheet per room ──
  project.rooms.forEach(room => {
    const rows = [];
    if (room.condition) rows.push(['Condition', room.condition.toUpperCase()]);
    if (room.notes && room.notes.trim()) rows.push(['Room Notes', room.notes.trim()]);
    if (rows.length) rows.push([]);
    rows.push(['Group', 'Item', 'Qty', 'Unit', 'Unit Cost', 'Line Total', 'Notes']);
    let hasItems = false;
    let roomTotal = 0;
    room.groups.forEach(g => {
      const groupDef = GROUPS[g.key];
      if (g.noActionNeeded) {
        rows.push([groupDef?.label || g.key, 'No Action Needed', '', '', '', '', '']);
        hasItems = true;
      } else {
        g.items.forEach(item => {
          const lineTot = (item.qty || 0) * (item.unitCost || 0);
          roomTotal += lineTot;
          rows.push([
            groupDef?.label || g.key,
            item.name,
            item.qty || 0,
            item.unit,
            item.unitCost || 0,
            lineTot,
            [item.notes, item.year ? `Year: ${item.year}` : '', item.serialNumber ? `S/N: ${item.serialNumber}` : ''].filter(Boolean).join(' | '),
          ]);
          hasItems = true;
        });
      }
    });
    if (hasItems) {
      rows.push([]);
      rows.push(['', '', '', '', 'ROOM TOTAL', roomTotal, '']);
    }
    if (hasItems || (room.notes && room.notes.trim()) || room.condition) {
      const sheet = XLSX.utils.aoa_to_sheet(rows);
      sheet['!cols'] = [{ wch:20 },{ wch:36 },{ wch:8 },{ wch:14 },{ wch:12 },{ wch:12 },{ wch:30 }];
      if (hasItems) {
        const totalRowNum = rows.length; // 1-indexed Excel row for the last pushed row
        ['E','F'].forEach(col => {
          const ref = `${col}${totalRowNum}`;
          if (sheet[ref]) sheet[ref].s = { font: { bold: true } };
        });
      }
      XLSX.utils.book_append_sheet(wb, sheet, room.label.substring(0, 31));
    }
  });

  return XLSX.write(wb, { bookType:'xlsx', type:'array' });
}

async function exportZip(project) {
  const zip = new JSZip();

  // Excel
  const excelData = buildExcel(project);
  zip.file('estimate.xlsx', excelData);

  // Photos organized by room/group
  project.rooms.forEach(room => {
    const safeRoom = room.label.replace(/[^a-z0-9 ]/gi, '_');
    room.groups.forEach(g => {
      const groupDef = GROUPS[g.key];
      const safeGroup = (groupDef?.label || g.key).replace(/[^a-z0-9 ]/gi, '_');
      const folder = `photos/${safeRoom}/${safeGroup}`;

      // Group-level photos
      (g.groupPhotos || []).forEach((ph, i) => {
        const b64 = ph.dataUrl.split(',')[1];
        zip.file(`${folder}/context_${i+1}.jpg`, b64, { base64: true });
      });

      // Item photos
      g.items.forEach(item => {
        if (item.photos?.length > 0) {
          const safeItem = item.name.replace(/[^a-z0-9 ]/gi, '_').substring(0, 30);
          item.photos.forEach((ph, i) => {
            const b64 = ph.dataUrl.split(',')[1];
            zip.file(`${folder}/${safeItem}_${i+1}.jpg`, b64, { base64: true });
          });
        }
      });
    });
  });

  // Project summary text — leads with the same plain-English summary shown
  // in the app, then the full structured record below it.
  const summaryData = buildProjectSummaryData(project);
  const sentences = buildProjectSummarySentences(summaryData);
  const { issues, deal } = summaryData;
  const summary = [
    `SPARK HOMES REPAIR ESTIMATE`,
    `Project: ${project.name}`,
    `Address: ${project.address || '—'}`,
    `Date: ${new Date().toLocaleDateString()}`,
    ``,
    `SUMMARY`,
    ...sentences,
    ``,
    `Total Estimate: ${fmt(getProjectTotal(project))}`,
    ...(project.notes && project.notes.trim() ? ['', `Project Notes: ${project.notes.trim()}`] : []),
    ``,
    `DEAL ANALYZER`,
    `Max Offer: ${fmt(deal?.maxOffer || 0)}`,
    `Estimated Profit: ${fmt(deal?.estimatedProfit || 0)}`,
    `Deal Confidence: ${(deal?.confidence || 'N/A').toUpperCase()}`,
    ``,
    `SPARKCHECK (${issues.length} issues)`,
    ...issues.map(i => `[${i.level.toUpperCase()}] ${i.msg}`),
  ].join('\n');
  zip.file('summary.txt', summary);

  const blob = await zip.generateAsync({ type:'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${project.name.replace(/[^a-z0-9]/gi,'_')}_estimate.zip`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

  const tabs = [
    { id:'dashboard',    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2L2 8v10h5v-6h6v6h5V8L10 2z"/></svg>', label:'Projects' },
    { id:'walkthrough',  icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M4 5h12v1.5H4V5zm0 4h12v1.5H4V9zm0 4h8v1.5H4V13zm10.5 2.5l3-3-1.1-1.1-1.9 1.9-.9-.9-1.1 1.1 2 2z"/></svg>', label:'Walkthrough' },
    { id:'sparkcheck',   icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2L3 5v5c0 4.4 3 8.4 7 9.5C14 18.4 17 14.4 17 10V5L10 2zm1 12H9v-2h2v2zm0-4H9V6h2v4z"/></svg>', label:'SparkCheck' },
    { id:'deal-analyzer',icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M3 3h14v14H3V3zm2 2v10h10V5H5zm2 2h6v1.5H7V7zm0 3h6v1.5H7V10zm0 3h4v1.5H7V13z"/></svg>', label:'Deal' },
  ];

  const project = activeProject();
  const issues = project ? runSparkCheck(project) : [];
  const criticals = issues.filter(i => i.level === 'critical').length;

  return `<div class="flex-shrink-0 bg-white border-t border-slate-100 safe-bottom">
    <div class="flex">
      ${tabs.map(tab => {
        const active = tab.id === v || (tab.id === 'walkthrough' && isWalk);
        const warn = tab.id === 'sparkcheck' && criticals > 0;
        return `<button onclick="navigate('${tab.id}')" class="flex-1 flex flex-col items-center justify-center gap-0.5 py-2 ${active ? 'tab-active' : ''} relative">
          <div class="${warn ? 'text-red-500' : active ? 'text-brand' : 'text-slate-400'}">${tab.icon}</div>

        </button>`;
      }).join('')}
    </div>
  </div>`;
}

let _dashboardSort = localStorage.getItem(SK_SORT) || 'updated_desc';
function setDashboardSort(value) {
  _dashboardSort = value;
  try { localStorage.setItem(SK_SORT, value); } catch(e) {}
  render();
}

function toggleDashboardSortMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('dash-sort-menu');
  if (!menu) return;
  const opening = menu.classList.contains('hidden');
  menu.classList.toggle('hidden');
  if (opening) {
    // Defer so this same click doesn't immediately trigger the outside-click close.
    setTimeout(() => document.addEventListener('click', closeDashboardSortMenu, { once:true }), 0);
  }
}
function closeDashboardSortMenu() {
  document.getElementById('dash-sort-menu')?.classList.add('hidden');
}

const DASHBOARD_SORTS = {
  updated_desc: { label: 'Recently updated', cmp: (a,b) => (b.updatedAt||0) - (a.updatedAt||0) },
  name_asc:     { label: 'Name (A–Z)',       cmp: (a,b) => a.name.localeCompare(b.name) },
  status:       { label: 'Status',           cmp: (a,b) => {
    const order = { in_progress:0, not_started:1, complete:2 };
    return order[getProjectStatus(a).key] - order[getProjectStatus(b).key] || (b.updatedAt||0) - (a.updatedAt||0);
  } },
  total_desc:   { label: 'Total ($ high→low)', cmp: (a,b) => getProjectTotal(b) - getProjectTotal(a) },
};

function sortProjects(projects, sortKey) {
  const sorter = DASHBOARD_SORTS[sortKey] || DASHBOARD_SORTS.updated_desc;
  return [...projects].sort(sorter.cmp);
}

function getDashboardStats(projects) {
  const counts = { not_started: 0, in_progress: 0, complete: 0 };
  projects.forEach(p => { counts[getProjectStatus(p).key]++; });
  const inProgress = projects.filter(p => getProjectStatus(p).key === 'in_progress');
  const continueProject = inProgress.length
    ? inProgress.reduce((a, b) => (b.updatedAt||0) > (a.updatedAt||0) ? b : a)
    : null;
  return { total: projects.length, notStarted: counts.not_started, inProgress: counts.in_progress, complete: counts.complete, continueProject };
}

function renderContinueBanner(p) {
  const prog = getProgress(p);
  return `
    <button onclick="event.stopPropagation();setState({activeProjectId:'${p.id}',view:'walkthrough'})"

      <span class="text-white/60 flex-shrink-0">›</span>

}

// Room count toggles stored in DOM — read on submit
const _roomCounts = { bedroom:3, bathroom:2 };
const _roomToggles = { kitchen:true, living:true, 'interior-general':false, exterior:true, systems:true };

function setRoomCount(type, n) {
  _roomCounts[type] = n;
  const prefix = type === 'bedroom' ? 'bd' : 'ba';
  document.querySelectorAll(`.room-preset-${prefix}`).forEach(btn => {
    const val = parseInt(btn.dataset.val);
    btn.className = btn.className.replace(/border-brand bg-brand\/5 text-brand|border-slate-200 text-slate-600/g, '');
    btn.classList.add(...(val === n ? ['border-brand','bg-brand/5','text-brand'] : ['border-slate-200','text-slate-600']));
  });
  // picking a preset cancels any custom amount that was being entered
  const manualInput = document.getElementById(`${prefix}-manual`);
  if (manualInput) manualInput.value = '';
  document.getElementById(`${prefix}-manual-wrap`)?.classList.add('hidden');
  document.getElementById(`${prefix}-manual-btn`)?.classList.remove('hidden');
  updateRoomTotal();
}

function revealManualCount(type) {
  const prefix = type === 'bedroom' ? 'bd' : 'ba';
  document.getElementById(`${prefix}-manual-wrap`)?.classList.remove('hidden');
  document.getElementById(`${prefix}-manual-btn`)?.classList.add('hidden');
  document.getElementById(`${prefix}-manual`)?.focus();
}

function setRoomCountManual(type, value) {
  const n = Math.max(0, parseInt(value) || 0);
  _roomCounts[type] = n;
  const prefix = type === 'bedroom' ? 'bd' : 'ba';
  // typing a custom amount deselects the presets
  document.querySelectorAll(`.room-preset-${prefix}`).forEach(btn => {
    btn.className = btn.className.replace(/border-brand bg-brand\/5 text-brand|border-slate-200 text-slate-600/g, '');
    btn.classList.add('border-slate-200','text-slate-600');
  });
  updateRoomTotal();
}

function toggleRoomType(type) {
  _roomToggles[type] = !_roomToggles[type];
  const btn = document.getElementById(`rt-${type}`);
  if (btn) {
    if (_roomToggles[type]) {
      btn.className = btn.className.replace('border-slate-200 text-slate-600','border-brand bg-brand/5 text-brand');
    } else {
      btn.className = btn.className.replace('border-brand bg-brand/5 text-brand','border-slate-200 text-slate-600');
    }
  }
  updateRoomTotal();
}

function computeRoomTotal() {
  let n = _roomCounts.bedroom + _roomCounts.bathroom;
  ['kitchen','living','interior-general','exterior','systems'].forEach(type => { if (_roomToggles[type]) n++; });
  return n;
}

function updateRoomTotal() {
  const el = document.getElementById('room-total-count');
  if (el) el.textContent = `${computeRoomTotal()} rooms total`;
}

function createProjectAndStart() {
  const name = document.getElementById('proj-name')?.value?.trim();
  if (!name) {
    document.getElementById('proj-name')?.focus();
    document.getElementById('proj-name')?.classList.add('border-red-400');
    return;
  }
  const addr = document.getElementById('proj-addr')?.value || '';
  const roomConfigs = [];
  ['exterior','interior-general','living','kitchen'].forEach(type => {
    if (_roomToggles[type]) roomConfigs.push({ type });
  });
  for (let i = 0; i < _roomCounts.bedroom; i++) roomConfigs.push({ type:'bedroom' });
  for (let i = 0; i < _roomCounts.bathroom; i++) roomConfigs.push({ type:'bathroom' });
  if (_roomToggles.systems) roomConfigs.push({ type:'systems' });
  const project = createProject(name, addr, roomConfigs);
  // Walkthrough is not auto-started — the agent taps "Start Walkthrough" on the project screen.
  state.projects.push(project);
  setState({ activeProjectId: project.id, view:'walkthrough' });
}

function startWalkthrough() {
  const project = activeProject();
  if (!project) return;
  updateProject(project.id, p => { p.walkthroughStartedAt = Date.now(); });
  // "Start" should feel like it actually starts something — jump straight
  // into the first recommended room instead of just relabeling this card.
  if (project.rooms.length > 0) {
    setState({ activeRoomId: project.rooms[0].id, view: 'room-groups' });
  } else {
    render();
  }
}

// ── WALKTHROUGH ──

  const project = activeProject();

  const prog = getProgress(project);
  const issues = runSparkCheck(project);
  const crits = issues.filter(i => i.level === 'critical');
  const started = !!project.walkthroughStartedAt;
  const duration = started
    ? Date.now() - project.walkthroughStartedAt + (project.walkthroughDuration || 0)
    : 0;

  return `
    ${renderHeader(project.name)}
    <div class="flex-1 scroll-y" id="main-content">
      <!-- Progress card -->

          <div class="flex items-center justify-between mb-2.5">
            <div>
              <p class="text-sm font-bold text-slate-800">${started ? prog.pct + '% Complete' : 'Ready to start'}</p>
              <p class="text-xs text-slate-400">${prog.reviewed} of ${prog.total} groups reviewed</p>
            </div>
            <div class="text-right">
              <p class="text-xl font-bold text-slate-900 tabular-nums">${fmt(getProjectTotal(project))}</p>
              ${started && duration > 60000 ? `<p class="text-xs text-slate-400 flex items-center justify-end gap-1">${icon('clock', 'w-3 h-3')} ${formatDuration(duration)}</p>` : ''}
            </div>
          </div>
          <!-- Progress bar (always on top, easy to read) -->
          <div class="flex items-center gap-2">
            <div class="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden">
              <div class="progress-bar-fill h-full bg-brand rounded-full" style="width:${prog.pct}%"></div>
            </div>
            <span class="text-xs font-bold text-slate-500 tabular-nums w-9 text-right">${prog.pct}%</span>
          </div>
          ${!started ? `<button onclick="startWalkthrough()" class="mt-3 w-full py-3 bg-brand rounded-xl text-sm font-bold text-white flex items-center justify-center gap-1.5">${icon('play', 'w-4 h-4')} Start Walkthrough</button>` : ''}
          ${started && crits.length > 0 ? `<button onclick="navigate('sparkcheck')" class="mt-3 w-full py-2 bg-red-50 rounded-xl text-xs font-semibold text-red-600 border border-red-100 flex items-center justify-center gap-1.5">${icon('warning', 'w-3.5 h-3.5')} ${crits.length} critical issue${crits.length > 1 ? 's' : ''} — tap to review</button>` : ''}
          ${started && prog.pct === 100 ? `<button onclick="navigate('export')" class="mt-3 w-full py-2.5 bg-brand rounded-xl text-sm font-bold text-white">Export Estimate →</button>` : ''}
        </div>
      </div>

      <!-- Room list -->
      <div class="px-4 pb-20 mt-2">
        <div class="flex items-center justify-between px-1 mb-2">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Recommended Order</p>
          ${state.reorderMode
            ? `<button onclick="toggleReorderMode()" class="text-xs font-bold text-brand">Done</button>`
            : `<div class="flex items-center gap-3">
                 <button onclick="toggleReorderMode()" class="text-xs font-semibold text-brand">Reorder</button>
                 <p class="text-xs text-slate-400 tabular-nums">${project.rooms.filter(r => r.groups.length && r.groups.every(g => g.reviewed)).length}/${project.rooms.length} rooms done</p>
               </div>`}
        </div>
        ${state.reorderMode ? `<p class="px-1 mb-2 text-xs text-slate-400 flex items-center gap-1">${icon('grip', 'w-3.5 h-3.5')} Drag to set your own order — this doesn't change what's required, just the sequence.</p>` : ''}
        <div class="space-y-2" id="room-order-list">
        ${(() => {
          // "Next up" = the first room in the recommended order that still has
          // unreviewed groups — same room Start Walkthrough / Continue would
          // send you to. Shown so the order + your position in it are explicit.
          const nextRoomId = project.rooms.find(r => r.groups.some(g => !g.reviewed))?.id;
          return project.rooms.map((room, idx) => {
          const rt = ROOM_TYPE_MAP[room.type];
          const groupsDone = room.groups.filter(g => g.reviewed).length;
          const total = room.groups.length;
          const roomTotal = room.groups.reduce((s, g) => s + g.items.reduce((t, i) => t + (i.qty||0)*(i.unitCost||0), 0), 0);
          const pct = total ? Math.round(groupsDone / total * 100) : 0;
          const roomIssues = issues.filter(i => i.roomId === room.id).length;
          const roomTypeIssues = issues.filter(i => i.roomType === room.type).length;
          const hasIssues = roomIssues + roomTypeIssues;
          const isNext = room.id === nextRoomId;
          const condColors = { good:'bg-green-100 text-green-700', fair:'bg-amber-100 text-amber-700', poor:'bg-red-100 text-red-700', gut:'bg-red-200 text-red-800' };
          return `
            <div data-room-id="${room.id}"
              ${state.reorderMode ? '' : `onclick="setState({activeRoomId:'${room.id}',view:'room-groups'})"`}
              class="room-order-card bg-white rounded-2xl border shadow-sm overflow-hidden ${isNext ? 'border-brand/30 ring-1 ring-brand/15' : 'border-slate-100'}">
              <div class="p-4">
                <div class="flex items-center gap-3">
                  <span class="w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold flex-shrink-0 tabular-nums ${isNext ? 'bg-brand text-white' : 'bg-slate-100 text-slate-400'}">${idx + 1}</span>
                  <span class="w-9 h-9 rounded-xl bg-slate-50 flex items-center justify-center text-slate-500 flex-shrink-0">${icon(rt?.icon || 'home', 'w-5 h-5')}</span>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                      <p class="font-semibold text-slate-900 text-sm">${esc(room.label)}</p>
                      ${isNext ? `<span class="text-[10px] px-1.5 py-0.5 rounded-full font-bold bg-brand/10 text-brand uppercase tracking-wide">Next</span>` : ''}
                      ${room.condition ? `<span class="text-xs px-2 py-0.5 rounded-full font-medium ${condColors[room.condition] || 'bg-slate-100 text-slate-600'}">${room.condition}</span>` : ''}
                      ${hasIssues ? `<span class="text-xs text-red-500 font-semibold inline-flex items-center gap-0.5">${icon('warning', 'w-3 h-3')} ${hasIssues}</span>` : ''}
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                      <div class="flex-1 h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-brand rounded-full progress-bar-fill" style="width:${pct}%"></div>
                      </div>
                      <span class="text-xs text-slate-400 tabular-nums">${groupsDone}/${total}</span>
                    </div>
                  </div>
                  ${state.reorderMode ? `
                    <button class="drag-handle w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-500 flex-shrink-0 active:bg-slate-200" onclick="event.stopPropagation()" aria-label="Drag to reorder">
                      ${icon('grip', 'w-5 h-5')}
                    </button>
                  ` : `
                    <div class="text-right flex-shrink-0">
                      ${roomTotal > 0 ? `<p class="text-sm font-bold text-slate-900 tabular-nums">${fmt(roomTotal)}</p>` : ''}
                      <p class="text-xs text-brand font-semibold mt-0.5">›</p>
                    </div>
                  `}
                </div>
              </div>
            </div>`;
          }).join('');
        })()}
        </div>

        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden mt-4">
          <div class="flex">
            <button onclick="navigate('room-setup')" class="flex-1 py-3 text-sm text-brand font-semibold border-r border-slate-100">+ Edit Rooms</button>
            <button onclick="navigate('export')" class="flex-1 py-3 text-sm text-slate-600 font-semibold">Export →</button>
          </div>
        </div>
      </div>
    </div>
    ${renderBottomNav()}`;
}

// ── ROOM GROUPS ──

function renderRoomGroups() {
  const project = activeProject();
  const room = project ? getRoomById(project, state.activeRoomId) : null;
  if (!room) return renderWalkthrough();
  const rt = ROOM_TYPE_MAP[room.type];
  const roomTotal = room.groups.reduce((s, g) => s + g.items.reduce((t, i) => t + (i.qty||0)*(i.unitCost||0), 0), 0);
  const condColors = { good:'bg-green-100 text-green-700', fair:'bg-amber-100 text-amber-700', poor:'bg-red-100 text-red-700', gut:'bg-red-200 text-red-800' };
  const condOpts = ['good','fair','poor','gut'];
  // Only multi-instance room types (Bedroom, Bathroom) benefit from copying —
  // that's where agents redo near-identical setups room after room.
  const copySiblings = rt?.multi ? project.rooms.filter(r => r.type === room.type && r.id !== room.id) : [];

  // Breadcrumb + dual progress: the sticky header now carries BOTH bars —
  // a prominent, named "Exterior · 1/5" bar for THIS room (persists even on
  // group-detail), and a thin muted "X% overall" bar for the whole project.
  // Both live in the header (outside the scroll container) so they stay put
  // as the agent scrolls or drills into groups — no separate body card needed.
  const roomIdx = project.rooms.findIndex(r => r.id === room.id) + 1;
  const roomsTotal = project.rooms.length;
  const overallProg = getProgress(project);
  const roomReviewed = room.groups.filter(g => g.reviewed).length;
  const roomGroupsTotal = room.groups.length;
  const roomPct = roomGroupsTotal ? Math.round(roomReviewed / roomGroupsTotal * 100) : 0;
  const nextRoom = getNextIncompleteRoom(project, room.id);

  return `
    ${renderHeader(room.label, false, true, 'walkthrough', {
      // Most locally-relevant info goes first — if the subtitle line has to
      // truncate on a long address, it clips the (stable, always-visible-
      // elsewhere) address, never the room position.
      subtitle: `Room ${roomIdx} of ${roomsTotal} · ${project.name}`,
      progressPct: overallProg.pct,
      roomProgress: { label: room.label, reviewed: roomReviewed, total: roomGroupsTotal, pct: roomPct, roomId: room.id },
    })}
    <div class="flex-1 scroll-y" id="main-content">
      <div class="px-4 pt-4 pb-24 fade-in">
        ${copySiblings.length > 0 ? `
          <button onclick="openCopyRoomPicker('${project.id}','${room.id}')"
            class="w-full flex items-center justify-between gap-2 bg-brand/5 border border-brand/20 rounded-2xl p-3.5 mb-3 active:bg-brand/10">
            <span class="flex items-center gap-2 text-sm font-semibold text-brand">${icon('copy', 'w-4 h-4')} Copy setup from another ${esc(rt.label)}</span>
            ${icon('chevron', 'w-4 h-4 text-brand/50')}
          </button>` : ''}
        <!-- Condition Scoring -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 mb-3">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Room Condition</p>
          <div class="flex gap-2">
            ${condOpts.map(c => `
              <button onclick="setRoomCondition('${project.id}','${room.id}','${c}')"
                class="flex-1 py-2 rounded-xl border-2 text-xs font-semibold transition-colors capitalize
                ${room.condition === c ? (condColors[c] + ' border-current') : 'border-slate-200 text-slate-500'}">
                ${c}
              </button>`).join('')}
          </div>
        </div>

        <!-- Room Notes -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 mb-3">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Room Notes</p>
          <textarea
            placeholder="Add notes for ${esc(room.label)} — e.g. water stain on ceiling, tenant belongings, access issues…"
            rows="2"
            class="w-full border-2 border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:border-brand text-slate-900 resize-none leading-snug"
            onchange="setRoomNotes('${project.id}','${room.id}',this.value)"
          >${esc(room.notes || '')}</textarea>
        </div>

        <!-- Group list -->
        <div class="space-y-2">
          ${room.groups.map(g => {
            const gDef = GROUPS[g.key];
            const gTotal = g.items.reduce((s, i) => s + (i.qty||0)*(i.unitCost||0), 0);
            const issues = runSparkCheck(project).filter(i => i.groupKey === g.key && (i.roomId === room.id || i.roomType === room.type));
            let statusBadge = '';
            if (g.noActionNeeded) statusBadge = `<span class="text-xs text-green-600 font-semibold inline-flex items-center gap-0.5">${icon('check', 'w-3 h-3')} NAN</span>`;
            else if (g.items.length > 0) statusBadge = `<span class="text-xs text-brand font-semibold">${g.items.length} item${g.items.length > 1 ? 's' : ''}</span>`;
            else if (g.reviewed) statusBadge = `<span class="text-xs text-green-600 font-semibold inline-flex items-center">${icon('check', 'w-3.5 h-3.5')}</span>`;
            const riskColor = gDef?.riskLevel === 'critical' ? 'border-l-4 border-l-red-400' : gDef?.riskLevel === 'high' ? 'border-l-4 border-l-amber-400' : '';
            return `
              <div onclick="setState({activeRoomId:'${room.id}',activeGroupKey:'${g.key}',view:'group-detail'})"
                class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden ${riskColor}">
                <div class="p-4 flex items-center gap-3">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                      <p class="font-semibold text-slate-900 text-sm">${esc(gDef?.label || g.key)}</p>
                      ${gDef?.riskLevel === 'critical' ? `<span class="text-[10px] bg-red-100 text-red-600 font-bold px-1.5 py-0.5 rounded uppercase tracking-wide">Critical</span>` : ''}
                      ${issues.length > 0 ? `<span class="text-xs text-amber-500 inline-flex">${icon('warning', 'w-3.5 h-3.5')}</span>` : ''}
                    </div>
                    ${gTotal > 0 ? `<p class="text-xs text-brand font-semibold tabular-nums mt-0.5">${fmt(gTotal)}</p>` : `<p class="text-xs text-slate-400 mt-0.5">${gDef?.itemIds?.length || 0} items available</p>`}
                  </div>
                  <div class="flex items-center gap-2">
                    ${statusBadge}
                    <span class="text-brand font-bold text-base">›</span>
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>

        ${roomTotal > 0 ? `<div class="mt-4 p-4 bg-orange-50 rounded-2xl flex justify-between items-center border border-orange-100">
          <span class="text-sm font-semibold text-orange-800">${esc(room.label)} Total</span>
          <span class="text-lg font-bold text-brand tabular-nums">${fmt(roomTotal)}</span>
        </div>` : ''}

        <div class="mt-4 space-y-2">
          ${roomReviewed < roomGroupsTotal ? `
            <p class="text-center text-xs text-amber-600 font-semibold flex items-center justify-center gap-1">
              ${icon('warning', 'w-3.5 h-3.5')} ${roomGroupsTotal - roomReviewed} group${roomGroupsTotal - roomReviewed > 1 ? 's' : ''} in ${esc(room.label)} still need${roomGroupsTotal - roomReviewed > 1 ? '' : 's'} review
            </p>
          ` : ''}
          ${nextRoom ? `
            <button onclick="goToRoom('${nextRoom.id}')" class="w-full py-3.5 bg-brand text-white font-bold rounded-2xl text-sm">
              Continue to ${esc(nextRoom.label)} →
            </button>
            <button onclick="navigate('walkthrough')" class="w-full py-3 text-center text-sm text-slate-600 font-semibold bg-white border border-slate-200 rounded-2xl active:bg-slate-50">
              ‹ All Rooms
            </button>
          ` : overallProg.pct >= 100 ? `
            <button onclick="navigate('export')" class="w-full py-3.5 bg-brand text-white font-bold rounded-2xl text-sm">
              All Rooms Reviewed — Go to Export →
            </button>
          ` : `
            <button onclick="navigate('walkthrough')" class="w-full py-3.5 bg-brand text-white font-bold rounded-2xl text-sm">
              Save & Back to Walkthrough
            </button>
          `}
        </div>
      </div>
    </div>
    ${renderBottomNav()}`;
}

// ── GROUP DETAIL ──

function renderGroupDetail() {
  const project = activeProject();
  const room = project ? getRoomById(project, state.activeRoomId) : null;
  const groupState = room ? getGroupState(room, state.activeGroupKey) : null;
  if (!groupState || !project) return renderWalkthrough();
  const gDef = GROUPS[state.activeGroupKey];
  const catalogItemIds = gDef?.itemIds || [];
  const groupTotal = groupState.items.reduce((s, i) => s + (i.qty||0)*(i.unitCost||0), 0);
  const hasProfiles = QUICK_PROFILES[state.activeGroupKey]?.length > 0;

  // Photos for this group
  const allPhotos = [...(groupState.groupPhotos || [])];
  groupState.items.forEach(item => { allPhotos.push(...(item.photos || []).map(p => ({ ...p, _itemId: item.id, _itemName: item.name }))); });

  // Breadcrumb context: which room (of how many), and which group within it.
  const roomIdx = project.rooms.findIndex(r => r.id === room.id) + 1;
  const roomsTotal = project.rooms.length;
  const groupIdxInRoom = room.groups.findIndex(g => g.key === state.activeGroupKey);
  const groupsInRoomTotal = room.groups.length;
  const isLastGroupInRoom = groupIdxInRoom === groupsInRoomTotal - 1;
  const roomReviewed = room.groups.filter(g => g.reviewed).length;
  const roomPct = groupsInRoomTotal ? Math.round(roomReviewed / groupsInRoomTotal * 100) : 0;

  // "What's next" preview so the agent always knows where "Done" takes them.
  let nextHint;
  if (!isLastGroupInRoom) {
    const nextGDef = GROUPS[room.groups[groupIdxInRoom + 1].key];
    nextHint = `Next: ${nextGDef?.label || 'next group'}`;
  } else {
    const nextRoomPreview = getNextIncompleteRoom(project, room.id);
    nextHint = nextRoomPreview
      ? `Last group in this room — next up: ${nextRoomPreview.label}`
      : `Last group left to review — nice work!`;
  }

  return `
    ${renderHeader(`${room.label} › ${gDef?.label || state.activeGroupKey}`, false, true, 'room-groups', {
      // Same priority order as room-groups: position counters first, address
      // last, so truncation on a long title never eats the Room/Group counts.
      subtitle: `Group ${groupIdxInRoom + 1}/${groupsInRoomTotal} · Room ${roomIdx}/${roomsTotal} · ${project.name}`,
      progressPct: getProgress(project).pct,
      roomProgress: { label: room.label, reviewed: roomReviewed, total: groupsInRoomTotal, pct: roomPct, roomId: room.id },
    })}
    <div class="flex-1 scroll-y" id="main-content">
      <div class="pb-24 fade-in">

        <!-- NAN + Quick Profiles bar -->
        <div class="px-4 pt-4 flex gap-2 mb-1">
          <button onclick="handleNAN('${project.id}','${room.id}','${state.activeGroupKey}')"
            class="flex-1 py-2.5 rounded-xl border-2 text-sm font-semibold transition-colors flex items-center justify-center gap-1.5
            ${groupState.noActionNeeded ? 'bg-green-50 border-green-400 text-green-700' : 'border-slate-200 text-slate-500'}">
            ${icon('check', 'w-4 h-4')} <span>No Action Needed</span>
          </button>
          ${hasProfiles ? `<button onclick="openProfilesModal('${state.activeGroupKey}')" class="px-4 py-2.5 rounded-xl border-2 border-brand/30 text-brand text-sm font-semibold flex items-center gap-1.5">${icon('bolt', 'w-4 h-4')} Quick</button>` : ''}
        </div>

        ${gDef?.riskLevel === 'critical' ? `<div class="mx-4 mb-1 p-3 bg-red-50 rounded-xl border border-red-100"><p class="text-xs text-red-600 font-medium flex items-center gap-1.5">${icon('warning', 'w-4 h-4')} Critical group — this must be reviewed on every walkthrough</p></div>` : ''}

        <!-- Item list -->
        <div class="mx-4 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden mt-2 mb-3">
          ${catalogItemIds.length === 0 && groupState.items.length === 0 ? `<p class="text-xs text-slate-400 text-center py-6 px-4">No standard items for this room. Use <span class="text-brand font-semibold">Add Custom Item</span> below to add repairs.</p>` : ''}
          ${catalogItemIds.map(catId => {
            const cat = CATALOG[catId];
            if (!cat) return '';
            const selected = getSelectedCatalogItem(groupState, catId);
            const eff = getEffectivePrice(catId, project);
            const overridden = isPriceOverridden(catId, project);
            const lineTotal = selected ? (selected.qty || 0) * (selected.unitCost || 0) : 0;
            return `
              <div class="border-b border-slate-50 last:border-b-0">
                <div class="flex items-start gap-3 px-4 py-3.5">
                  <button onclick="handleToggleItem('${project.id}','${room.id}','${state.activeGroupKey}','${catId}')"
                    class="mt-0.5 w-5 h-5 rounded-md border-2 flex-shrink-0 flex items-center justify-center transition-colors
                    ${selected ? 'bg-brand border-brand' : 'border-slate-300'}">
                    ${selected ? '<svg width="10" height="10" viewBox="0 0 10 10" fill="white"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="2" fill="none"/></svg>' : ''}
                  </button>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2">
                      <div>
                        <p class="text-sm font-medium text-slate-800 leading-snug">${esc(cat.name)}</p>
                        <div class="flex items-center gap-1.5 mt-0.5">
                          <button onclick="openPriceModal('${catId}','${esc(cat.name)}')"
                            class="text-xs ${overridden ? 'text-orange-500 font-semibold' : 'text-slate-400'} hover:text-brand">
                            ${fmt(eff)}/${esc(cat.unit)}${overridden ? ` ${icon('pencil', 'w-3 h-3 inline')}` : ''}
                          </button>
                          ${cat.notes ? `<span class="text-[10px] text-slate-300">·</span><span class="text-[10px] text-slate-400 italic">${esc(cat.notes)}</span>` : ''}
                        </div>
                      </div>
                      ${selected ? `<span class="text-sm font-bold text-brand tabular-nums flex-shrink-0" id="lt-${selected.id}">${lineTotal > 0 ? fmt(lineTotal) : '—'}</span>` : ''}
                    </div>
                    ${selected ? `
                      <div class="mt-2 flex items-center gap-2">
                        <div class="flex items-center gap-1.5 bg-slate-50 rounded-xl px-3 py-1.5 border border-slate-100">
                          <span class="text-xs text-slate-400">Qty</span>
                          <input type="number" inputmode="decimal" value="${selected.qty || ''}" placeholder="0"
                            class="w-20 text-sm font-semibold text-slate-900 bg-transparent focus:outline-none text-center tabular-nums"
                            onchange="handleQtyChange('${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}',this.value)"
                            oninput="liveUpdateTotal('${selected.id}','${selected.unitCost||0}',this.value)"
                          />
                          <span class="text-xs text-slate-400">${esc(cat.unit)}</span>
                        </div>
                        ${cat.hasYear ? `<input type="number" inputmode="numeric" value="${selected.year||''}" placeholder="Year"
                          class="w-20 text-sm text-center border border-slate-200 rounded-xl px-2 py-1.5 focus:border-brand"
                          onchange="handleYearChange('${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}',this.value)" />` : ''}
                        <label class="ml-auto cursor-pointer">
                          <span class="w-8 h-8 bg-slate-100 rounded-xl flex items-center justify-center text-slate-500">${icon('camera', 'w-4 h-4')}</span>
                          <input type="file" accept="image/*" capture="environment" class="hidden"
                            onchange="handlePhotoCapture(event,'${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}')" />
                        </label>
                        <button onclick="handleDeleteItem('${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}')"
                          class="w-8 h-8 bg-red-50 rounded-xl flex items-center justify-center text-red-400">${icon('close', 'w-3.5 h-3.5')}</button>
                      </div>
                      ${selected.serialNumber
                        ? `<button onclick="editSerialManually('${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}','${esc(selected.serialNumber)}')" class="mt-1.5 flex items-center gap-1 text-xs text-brand font-semibold"><span class="flex items-center gap-1">${icon('key', 'w-3.5 h-3.5')} S/N: ${esc(selected.serialNumber)}</span><span class="text-slate-300 not-italic">${icon('pencil', 'w-3 h-3')}</span></button>`
                        : (cat.hasYear ? `<button onclick="editSerialManually('${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}','')" class="mt-1.5 text-xs text-slate-400 hover:text-brand font-medium underline">+ Add serial number</button>` : '')}
                      ${cat.min && selected.qty > 0 && (selected.qty * selected.unitCost) < cat.min ? `<p class="mt-1.5 text-xs text-amber-600 font-medium flex items-center gap-1">${icon('warning', 'w-3.5 h-3.5')} Below typical minimum of ${fmt(cat.min)} for this item</p>` : ''}
                      <input type="text" value="${esc(selected.notes || '')}" placeholder="Add a note (optional)…"
                        class="mt-2 w-full text-xs text-slate-600 bg-slate-50 border border-slate-100 rounded-lg px-3 py-2 focus:outline-none focus:border-brand placeholder:text-slate-300"
                        onchange="setItemNotes('${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}',this.value)" />
                      ${selected.photos?.length > 0 ? `
                        <div class="flex gap-2 mt-2 flex-wrap">
                          ${selected.photos.map(ph => `
