function goNextGroup() {
  const project = activeProject();
  const room = project ? getRoomById(project, state.activeRoomId) : null;
  if (!room) { navigate('walkthrough'); return; }
  const gIdx = room.groups.findIndex(g => g.key === state.activeGroupKey);
  if (gIdx < room.groups.length - 1) {
    const nextKey = room.groups[gIdx + 1].key;
    setState({ activeGroupKey: nextKey });
  } else {
    navigate('room-groups');
  }
}

// ── SPARKCHECK ──

function renderSparkCheck() {
  const project = activeProject();
  if (!project) return renderNeedsProject();
  const issues = runSparkCheck(project);
  const crits = issues.filter(i => i.level === 'critical');
  const warns = issues.filter(i => i.level === 'warning');
  const infos = issues.filter(i => i.level === 'info');

  const levelConfig = {
    critical: { label:'Critical', color:'text-red-600', bg:'bg-red-50', border:'border-red-200', dotClass:'bg-red-500' },
    warning:  { label:'Warning',  color:'text-amber-600', bg:'bg-amber-50', border:'border-amber-200', dotClass:'bg-amber-500' },
    info:     { label:'Info',     color:'text-sky-600', bg:'bg-sky-50', border:'border-sky-200', dotClass:'bg-sky-500' },
  };

  const renderGroup = (list, level) => {
    if (!list.length) return '';
    const cfg = levelConfig[level];
    return `
      <div class="mb-3">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-wide px-4 mb-2 flex items-center gap-1.5">${dot(cfg.dotClass)} ${cfg.label} (${list.length})</p>
        <div class="px-4 space-y-2">
          ${list.map(issue => {
            const hasLink = issue.roomId || issue.roomType;
            return `
              <div class="${cfg.bg} rounded-2xl border ${cfg.border} p-4 ${hasLink ? 'cursor-pointer' : ''}"
                ${hasLink ? `onclick="navigateToIssue('${issue.roomId||''}','${issue.roomType||''}','${issue.groupKey||''}')"` : ''}>
                <p class="text-sm font-medium ${cfg.color} leading-snug">${esc(issue.msg)}</p>
                ${hasLink ? `<p class="text-xs ${cfg.color} opacity-60 mt-1">Tap to go there →</p>` : ''}
              </div>`;
          }).join('')}
        </div>
      </div>`;
  };

  return `
    ${renderHeader('SparkCheck')}
    <div class="flex-1 scroll-y" id="main-content">
      <div class="px-4 pt-4 pb-24 fade-in">
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 mb-4">
          <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center
              ${crits.length > 0 ? 'bg-red-100 text-red-600' : warns.length > 0 ? 'bg-amber-100 text-amber-600' : 'bg-green-100 text-green-600'}">
              ${icon(crits.length > 0 ? 'warning' : warns.length > 0 ? 'bolt' : 'check-circle', 'w-8 h-8')}
            </div>
            <div>
              <p class="font-bold text-slate-900 text-base">
                ${issues.length === 0 ? 'All Clear' : `${issues.length} Issue${issues.length > 1 ? 's' : ''} Found`}
              </p>
              <p class="text-xs text-slate-400 mt-0.5">
                ${crits.length} critical · ${warns.length} warnings · ${infos.length} info
              </p>
            </div>
          </div>
          ${issues.length === 0 ? `<p class="mt-3 text-sm text-green-600 font-medium">Your estimate looks complete and credible. Ready to export!</p>` : ''}
        </div>

        ${renderGroup(crits, 'critical')}
        ${renderGroup(warns, 'warning')}
        ${renderGroup(infos, 'info')}

        ${issues.length > 0 ? `
          <div class="mt-4 px-0">
            <button onclick="navigate('export')" class="w-full py-3.5 bg-brand text-white font-bold rounded-2xl text-sm">
              Export Anyway →
            </button>
          </div>` : `
          <div class="mt-4">
            <button onclick="navigate('export')" class="w-full py-3.5 bg-brand text-white font-bold rounded-2xl text-sm">
              Export Estimate →
            </button>
          </div>`}
      </div>
    </div>
    ${renderBottomNav()}`;
}

function navigateToIssue(roomId, roomType, groupKey) {
  const project = activeProject();
  if (!project) return;
  let targetRoomId = roomId;
  if (!targetRoomId && roomType) {
    const room = project.rooms.find(r => r.type === roomType);
    if (room) targetRoomId = room.id;
  }
  if (!targetRoomId) return;
  if (groupKey) {
    setState({ activeRoomId: targetRoomId, activeGroupKey: groupKey, view: 'group-detail' });
  } else {
    setState({ activeRoomId: targetRoomId, view: 'room-groups' });
  }
}

// ── DEAL ANALYZER ──

function renderDealAnalyzer() {
  const project = activeProject();
  if (!project) return renderNeedsProject();
  const da = project.dealAnalyzer || {};
  const deal = analyzeDeal(project);
  const confColors = { green:'bg-green-500', yellow:'bg-amber-400', red:'bg-red-500' };
  // The bar itself is already colored (bg-green/amber/red above), so the
  // label doesn't need a redundant colored-dot icon on top of it.
  const confLabels = { green:'Green — Deal looks strong', yellow:'Yellow — Thin margin, proceed carefully', red:'Red — Deal does not pencil' };

  // Sensitivity: how much more can repair cost before deal goes red?
  const buffer = deal ? (deal.redThreshold - deal.repair) : 0;

  return `
    ${renderHeader('Deal Analyzer')}
    <div class="flex-1 scroll-y" id="main-content">
      <div class="px-4 pt-4 pb-24 fade-in">

        ${deal && da.arv > 0 ? `
          <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 mb-4">
            <div class="w-full h-12 rounded-xl flex items-center justify-center text-white font-bold text-sm mb-3 ${confColors[deal.confidence]}">
              ${confLabels[deal.confidence]}
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-slate-50 rounded-xl p-3">
                <p class="text-xs text-slate-400">Max Offer</p>
                <p class="text-xl font-bold text-slate-900 tabular-nums">${fmt(deal.maxOffer)}</p>
              </div>
              <div class="bg-slate-50 rounded-xl p-3">
                <p class="text-xs text-slate-400">Est. Profit</p>
                <p class="text-xl font-bold ${deal.estimatedProfit >= 0 ? 'text-green-600' : 'text-red-600'} tabular-nums">${fmt(deal.estimatedProfit)}</p>
              </div>
            </div>
            ${buffer !== 0 ? `
              <div class="mt-3 p-3 ${buffer > 0 ? 'bg-green-50 border border-green-100' : 'bg-red-50 border border-red-100'} rounded-xl">
                <p class="text-xs font-semibold ${buffer > 0 ? 'text-green-700' : 'text-red-700'}">
                  ${buffer > 0 
                    ? `Deal stays green if repairs stay under ${fmt(deal.repair + buffer)} (${fmt(buffer)} buffer)`
                    : `Repairs already exceed max by ${fmt(Math.abs(buffer))}`}
                </p>
              </div>` : ''}
          </div>
        ` : ''}

        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 mb-4">
          <h3 class="font-semibold text-slate-800 mb-4">Deal Numbers</h3>
          <div class="space-y-3">
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">ARV</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.arv||''}" placeholder="0"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('arv',this.value)" />
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Purchase Price</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.purchasePrice||''}" placeholder="0"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('purchasePrice',this.value)" />
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Repair Estimate</label>
              <div class="flex-1 flex items-center border-2 border-slate-100 bg-slate-50 rounded-xl overflow-hidden">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <span class="flex-1 py-2.5 text-sm font-bold text-brand tabular-nums">${(getProjectTotal(project)||0).toFixed(2)}</span>
                <span class="px-3 text-xs text-slate-400">auto</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Target Profit</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.targetProfit||30000}" placeholder="30000"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('targetProfit',this.value)" />
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Holding Costs</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.holdingCosts||18000}" placeholder="18000"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('holdingCosts',this.value)" />
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Selling Costs</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.sellingCosts||0}" placeholder="0"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('sellingCosts',this.value)" />
              </div>
            </div>
          </div>
        </div>

        <p class="text-xs text-slate-400 text-center mb-4">Formula: Max Offer = ARV − Repairs − Target Profit − Holding − Selling</p>
      </div>
    </div>
    ${renderBottomNav()}`;
}

function saveDealField(field, value) {
  const project = activeProject();
  if (!project) return;
  updateProject(project.id, p => {
    if (!p.dealAnalyzer) p.dealAnalyzer = {};
    p.dealAnalyzer[field] = parseFloat(value) || 0;
  });
  render();
}

    <div class="flex-1 scroll-y" id="main-content">

              </div>` : ''}

        </div>

        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 mb-4">
          <h3 class="font-semibold text-slate-800 mb-1">Export Package</h3>
          <p class="text-xs text-slate-400 mb-4">Downloads a ZIP file with Excel estimate + organized photos + summary.</p>
          <div class="space-y-2 text-xs text-slate-500 mb-4">
            <p class="flex items-center gap-1.5">${icon('bar-chart', 'w-3.5 h-3.5')} estimate.xlsx — cost breakdown by room</p>
            <p class="flex items-center gap-1.5">${icon('camera', 'w-3.5 h-3.5')} photos/ — organized by room and group</p>

        ${crits.length > 0 ? `
          <div class="bg-red-50 rounded-2xl border border-red-100 p-4">
            <p class="text-sm font-semibold text-red-700 mb-2 flex items-center gap-1.5">${icon('warning', 'w-4 h-4')} ${crits.length} critical issue${crits.length > 1 ? 's' : ''} before export:</p>
            ${crits.map(i => `<p class="text-xs text-red-600 mt-1">· ${esc(i.msg.substring(0,80))}</p>`).join('')}
            <button onclick="navigate('sparkcheck')" class="mt-3 w-full py-2.5 border border-red-200 rounded-xl text-red-600 text-sm font-semibold">Review Issues →</button>
          </div>` : ''}
      </div>
    </div>
    ${renderBottomNav()}`;
}

async function triggerExport() {
  const project = activeProject();
  if (!project) return;
  const btn = document.getElementById('export-btn');
  if (btn) { btn.innerHTML = `${icon('clock', 'w-4 h-4')} <span>Preparing…</span>`; btn.disabled = true; }
  try {
    await exportZip(project);
  } catch(e) {
    alert('Export failed: ' + e.message);
  } finally {
    if (btn) { btn.innerHTML = `${icon('arrow-down', 'w-4 h-4')} <span>Export ZIP</span>`; btn.disabled = false; }
  }
}

function sortRoomsByOrder(p) {
  // Once the agent has manually dragged rooms into their own order, never
  // silently re-sort back to the type-based default — that would wipe out
  // the customization the moment they add or remove any room.
  if (p.roomOrderCustomized) return;
  p.rooms.sort((a, b) =>
    (ROOM_TYPE_MAP[a.type]?.walkthroughOrder || 99) - (ROOM_TYPE_MAP[b.type]?.walkthroughOrder || 99));
}

// Pointer-based drag-to-reorder for the walkthrough room list. Runs after
// every render (since app.innerHTML fully replaces the DOM each time) and is
// a no-op unless reorder mode is on. Deliberately avoids calling the
// framework's render() mid-drag — that would destroy the DOM nodes the drag
// listeners are attached to. Instead it moves cards purely via CSS
// transforms and only commits + re-renders once, on release.
function initRoomReorder() {
  if (state.view !== 'walkthrough' || !state.reorderMode) return;
  const list = document.getElementById('room-order-list');
  const project = activeProject();
  if (!list || !project) return;
  const cardEls = Array.from(list.querySelectorAll('.room-order-card'));
  if (cardEls.length < 2) return;
  const originalOrder = cardEls.map(el => el.dataset.roomId);

  cardEls.forEach(card => {
    const handle = card.querySelector('.drag-handle');
    if (handle) handle.addEventListener('pointerdown', onPointerDown);
  });

  function onPointerDown(e) {
    e.preventDefault();
    e.stopPropagation();
    const card = e.currentTarget.closest('.room-order-card');
    if (!card) return;
    const draggedId = card.dataset.roomId;
    const startIndex = originalOrder.indexOf(draggedId);
    const startY = e.clientY;
    const cardHeight = cardEls[1].getBoundingClientRect().top - cardEls[0].getBoundingClientRect().top;
    let order = [...originalOrder];

    card.style.zIndex = '50';
    card.style.transition = 'none';
    card.style.boxShadow = '0 10px 28px rgba(15,23,42,0.18)';
    document.body.style.userSelect = 'none';

    function applyShifts() {
      cardEls.forEach(el => {
        const id = el.dataset.roomId;
        if (id === draggedId) return;
        const shift = (order.indexOf(id) - originalOrder.indexOf(id)) * cardHeight;
        el.style.transition = 'transform .15s ease';
        el.style.transform = shift ? `translateY(${shift}px)` : '';
      });
    }

    function onMove(ev) {
      const deltaY = ev.clientY - startY;
      card.style.transform = `translateY(${deltaY}px)`;
      const rawIndex = startIndex + Math.round(deltaY / cardHeight);
      const newIndex = Math.max(0, Math.min(order.length - 1, rawIndex));
      const curIndex = order.indexOf(draggedId);
      if (newIndex !== curIndex) {
        order.splice(curIndex, 1);
        order.splice(newIndex, 0, draggedId);
        applyShifts();
      }
    }

    function onUp() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.body.style.userSelect = '';
      updateProject(project.id, p => {
        const byId = Object.fromEntries(p.rooms.map(r => [r.id, r]));
        p.rooms = order.map(id => byId[id]).filter(Boolean);
        p.roomOrderCustomized = true;
      });
      render();
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp, { once: true });
  }
}

function addRoomOfType(projectId, type) {
  updateProject(projectId, p => {
    const rt = ROOM_TYPE_MAP[type];
    if (!rt) return;
    let label;
    if (rt.multi) {
      const count = p.rooms.filter(r => r.type === type).length + 1;
      label = `${rt.label} ${count}`;
    } else {
      if (p.rooms.some(r => r.type === type)) return; // single-instance already exists
      label = rt.label;
    }
    p.rooms.push(createRoom(type, label, p.rooms.length));
    sortRoomsByOrder(p);
  });
  render();
}

// ── Copy Room Setup (apply selections from one room instance to another) ──
// Saves agents from re-selecting near-identical items across Bathroom 2,
// Bathroom 3, Bedroom 2, etc. Only offered between rooms of the same type,
// since group keys (and therefore catalog items) differ across room types.
let _copyRoomCtx = null;

function roomStats(room) {
  const items = room.groups.reduce((s, g) => s + g.items.length, 0);
  const total = room.groups.reduce((s, g) => s + g.items.reduce((t, i) => t + (i.qty||0)*(i.unitCost||0), 0), 0);
  const nan = room.groups.filter(g => g.noActionNeeded).length;
  const parts = [];
  if (items > 0) parts.push(`${items} item${items > 1 ? 's' : ''} · ${fmt(total)}`);
  if (nan > 0) parts.push(`${nan} marked N/A`);
  return parts.length ? parts.join(' · ') : 'No selections yet';
}

function openCopyRoomPicker(projectId, roomId) {
  const project = state.projects.find(p => p.id === projectId);
  const room = getRoomById(project, roomId);
  if (!project || !room) return;
  const siblings = project.rooms.filter(r => r.type === room.type && r.id !== roomId);
  if (siblings.length === 0) return;

  // Skip the picker entirely when there's only one possible source — every
  // tap should earn its place, and this is the common 2-bathroom case.
  if (siblings.length === 1) { confirmCopyRoom(projectId, roomId, siblings[0].id); return; }

  _copyRoomCtx = { projectId, targetRoomId: roomId };
  document.getElementById('copy-room-sub').textContent = `Copy into ${room.label}`;
  document.getElementById('copy-room-list').innerHTML = siblings.map(r => `
    <button onclick="confirmCopyRoom('${projectId}','${roomId}','${r.id}')"
      class="w-full flex items-center justify-between gap-2 p-3.5 rounded-xl border-2 border-slate-200 text-left mb-2">
      <span>
        <span class="block text-sm font-semibold text-slate-800">${esc(r.label)}</span>
        <span class="block text-xs text-slate-400 mt-0.5">${esc(roomStats(r))}</span>
      </span>
      ${icon('chevron', 'w-4 h-4 text-slate-300 flex-shrink-0')}
    </button>`).join('');
  const modal = document.getElementById('copy-room-modal');
  modal.classList.remove('hidden');
  setTimeout(() => document.getElementById('copy-room-box').classList.add('open'), 10);
}

}

function confirmCopyRoom(projectId, targetRoomId, sourceRoomId) {
  closeCopyRoomModal();
  const project = state.projects.find(p => p.id === projectId);
  const target = getRoomById(project, targetRoomId);
  const source = getRoomById(project, sourceRoomId);
  if (!target || !source) return;
  const targetHasData = target.groups.some(g => g.items.length > 0 || g.noActionNeeded);
  const body = targetHasData
    ? `Copy "${source.label}"'s items and selections into "${target.label}"? This replaces what's currently in "${target.label}".`
    : `Copy "${source.label}"'s items and selections into "${target.label}"? Photos and serial numbers won't be copied — those stay specific to each room.`;
  openConfirm('Copy Room Setup', body, 'Copy', 'bg-brand', () => {
    applyRoomCopy(projectId, targetRoomId, sourceRoomId);
  });
}

function applyRoomCopy(projectId, targetRoomId, sourceRoomId) {
  updateProject(projectId, p => {
    const target = p.rooms.find(r => r.id === targetRoomId);
    const source = p.rooms.find(r => r.id === sourceRoomId);
    if (!target || !source || target.type !== source.type) return;
    target.groups = source.groups.map(g => ({
      key: g.key,
      reviewed: g.reviewed,
      noActionNeeded: g.noActionNeeded,
      groupPhotos: [], // photos are physical evidence tied to the source room — never copied
      items: g.items.map(i => ({
        ...i,
        id: uid(),
        photos: [],
        serialNumber: null,
        year: null,
        notes: '',
      })),
    }));
  });
  render();
}

async function handlePhotoCapture(event, projectId, roomId, groupKey, lineItemIdOrGroup) {
  const file = event.target.files?.[0];
  if (!file) return;
  event.target.value = '';

  // Check if this item has hasYear (needs OCR attempt)
  const project = state.projects.find(p => p.id === projectId);
  const room = project ? getRoomById(project, roomId) : null;
  const g = room ? getGroupState(room, groupKey) : null;
  const item = g ? getLineItemById(g, lineItemIdOrGroup) : null;
  const catItem = item?.catalogId ? CATALOG[item.catalogId] : null;
  const needsOCR = catItem?.hasYear;

  // Build the small compressed copy for storage/display, and — only when
  // this item needs a serial — a separate, much higher-resolution render
  // dedicated to OCR. Using the storage copy for OCR was the main reason
  // detection used to be unreliable.
  const [dataUrl, ocrDataUrl] = await Promise.all([
    compressPhoto(file),
    needsOCR ? preprocessForOCR(file).catch(() => null) : Promise.resolve(null),
  ]);
  const photo = { id: uid(), dataUrl, caption: '', ocrText: null, serialNumber: null };

  if (lineItemIdOrGroup === 'group') {
    addPhotoToGroup(projectId, roomId, groupKey, photo);
  } else {
    addPhotoToItem(projectId, roomId, groupKey, lineItemIdOrGroup, photo);
  }

  render();

  if (needsOCR) {
    // Attempt OCR regardless of connection status: if Tesseract's script/worker
    // assets were already cached (by the service worker or browser HTTP cache)
    // from a prior online session, this still works offline. It fails silently
    // if the assets aren't available yet.
    setTimeout(async () => {
      const text = await runOCR(ocrDataUrl || dataUrl);
      const candidates = extractSerialCandidates(text);
      // Only surface a modal when something plausible was actually found —
      // showing raw garbled OCR text as if it were the serial (the old
      // behavior) was misleading. If nothing plausible is found, the user
      // can still tap "+ Add serial number" to enter it manually.
      if (candidates.length) {
        openOcrModal(candidates, projectId, roomId, groupKey, lineItemIdOrGroup, photo.id);
      }
    }, 300);
  }
}

  setTimeout(() => document.getElementById('confirm-modal').classList.add('hidden'), 300);
}

function confirmDelete(projectId) {
  const p = state.projects.find(x => x.id === projectId);
  if (!p) return;
  openConfirm('Delete Project', `Delete "${p.name}"? This cannot be undone.`, 'Delete', 'bg-red-500', () => {
    state.projects = state.projects.filter(x => x.id !== projectId);
    if (state.activeProjectId === projectId) state.activeProjectId = state.projects[0]?.id || null;
    setState({ view:'dashboard' });
  });
}

function confirmDeleteRoom(projectId, roomId, label) {
  openConfirm('Remove Room', `Remove "${label}"? All items for this room will be lost.`, 'Remove', 'bg-red-500', () => {
    updateProject(projectId, p => { p.rooms = p.rooms.filter(r => r.id !== roomId); });
    render();
  });
}

// ── Price Override Modal ──

let _priceCtx = null;
function openPriceModal(itemId, itemName) {
  _priceCtx = itemId;
  const project = activeProject();
  const defaultCost = CATALOG[itemId]?.cost || 0;
  const currentCost = getEffectivePrice(itemId, project);
  document.getElementById('price-modal-title').textContent = `Override: ${itemName}`;
  document.getElementById('price-modal-sub').textContent = `Default: ${fmt(defaultCost)} · Current: ${fmt(currentCost)}`;
  document.getElementById('price-input').value = currentCost;
  const modal = document.getElementById('price-modal');
  modal.classList.remove('hidden');
  setTimeout(() => document.getElementById('price-box').classList.add('open'), 10);
  document.getElementById('price-project-btn').onclick = () => savePriceOverride('project');
  document.getElementById('price-global-btn').onclick = () => savePriceOverride('global');
}
function closePriceModal() {
  document.getElementById('price-box').classList.remove('open');
  setTimeout(() => document.getElementById('price-modal').classList.add('hidden'), 300);
}
function savePriceOverride(scope) {
  const itemId = _priceCtx;
  const val = parseFloat(document.getElementById('price-input').value) || 0;
  const project = activeProject();
  closePriceModal();
  if (!project || !itemId) return;
  if (scope === 'global') {
    state.globalPriceOverrides[itemId] = val;
    applyGlobalPriceToProjects(itemId, val);
    saveState();
  } else {
    updateProject(project.id, p => {
      p.priceOverrides[itemId] = val;
      // Update existing selected items with this catalogId
      p.rooms.forEach(room => {
        room.groups.forEach(g => {
          g.items.forEach(item => { if (item.catalogId === itemId) item.unitCost = val; });
        });
      });
    });
  }
  render();
}

// ── Photo Lightbox ──

let _lightboxCtx = null;
function openLightbox(dataUrl, projectId, roomId, groupKey, lineItemId, photoId) {
  _lightboxCtx = { projectId, roomId, groupKey, lineItemId, photoId };
  document.getElementById('lightbox-img').src = dataUrl;
  document.getElementById('lightbox-delete').onclick = () => {
    deletePhoto(_lightboxCtx.projectId, _lightboxCtx.roomId, _lightboxCtx.groupKey, _lightboxCtx.lineItemId, _lightboxCtx.photoId);
    closeLightbox();
    render();
  };
  document.getElementById('photo-lightbox').classList.remove('hidden');
}
function closeLightbox() {
  document.getElementById('photo-lightbox').classList.add('hidden');
  document.getElementById('lightbox-img').src = '';
}

// ── OCR Modal ──

let _ocrCtx = null;
function openOcrModal(candidates, projectId, roomId, groupKey, lineItemId, photoId) {
  _ocrCtx = { projectId, roomId, groupKey, lineItemId, photoId };
  const list = Array.isArray(candidates) ? candidates : (candidates ? [{ value: candidates, score: 0 }] : []);
  const isManualEntry = !photoId;
  document.getElementById('ocr-title').innerHTML = isManualEntry
    ? `${icon('key')} <span>Serial Number</span>`
    : `${icon('search')} <span>Serial Number Detected</span>`;
  document.getElementById('ocr-subtitle').textContent = isManualEntry ? 'Enter or edit the serial number' : 'Confirm or edit the extracted text';
  document.getElementById('ocr-input').value = list[0]?.value || '';
  const alts = list.slice(1, 4);
  document.getElementById('ocr-candidates').innerHTML = alts.length
    ? `<span class="w-full text-[11px] text-slate-400">Other text found on the label:</span>` +
      alts.map(c => `<button type="button" onclick="document.getElementById('ocr-input').value='${esc(c.value)}'"
        class="px-2.5 py-1 rounded-lg bg-slate-100 text-slate-600 text-xs font-mono hover:bg-slate-200">${esc(c.value)}</button>`).join('')
    : '';
  const modal = document.getElementById('ocr-modal');
  modal.classList.remove('hidden');
  setTimeout(() => document.getElementById('ocr-box').classList.add('open'), 10);
  document.getElementById('ocr-save-btn').onclick = () => {
    const serial = document.getElementById('ocr-input').value.trim();
    if (serial && _ocrCtx) {
      updateProject(_ocrCtx.projectId, p => {
        updateGroupStateIn(p, _ocrCtx.roomId, _ocrCtx.groupKey, g => {
          const item = g.items.find(i => i.id === _ocrCtx.lineItemId);
          if (item) item.serialNumber = serial;
        });
      });
    }
    closeOcrModal();
    render();
  };
}
function closeOcrModal() {
  document.getElementById('ocr-box').classList.remove('open');
  setTimeout(() => document.getElementById('ocr-modal').classList.add('hidden'), 300);
}

// ── Custom Item Modal ──

let _customCtx = null;
function openCustomModal(projectId, roomId, groupKey) {
  _customCtx = { projectId, roomId, groupKey };
  ['ci-name','ci-cost','ci-unit','ci-qty'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const modal = document.getElementById('custom-modal');
  modal.classList.remove('hidden');
  setTimeout(() => document.getElementById('custom-box').classList.add('open'), 10);
  document.getElementById('ci-name').focus();
}
function closeCustomModal() {
  document.getElementById('custom-box').classList.remove('open');
  setTimeout(() => document.getElementById('custom-modal').classList.add('hidden'), 300);
}
function saveCustomItem() {
  const name = document.getElementById('ci-name')?.value?.trim();
  const cost = parseFloat(document.getElementById('ci-cost')?.value) || 0;
  const unit = document.getElementById('ci-unit')?.value?.trim() || 'ea.';
  const qty = parseFloat(document.getElementById('ci-qty')?.value) || 0;
  if (!name) { document.getElementById('ci-name')?.focus(); return; }
  if (!_customCtx) return;
  updateProject(_customCtx.projectId, p => {
    updateGroupStateIn(p, _customCtx.roomId, _customCtx.groupKey, g => {
      g.items.push({ id: uid(), catalogId: null, name, qty, unitCost: cost, unit, notes: '', photos: [], year: null, serialNumber: null, isCustom: true });
      g.reviewed = true;
    });
  });
  closeCustomModal();
  render();
}

// ── Quick Profiles Modal ──

let _profileGroupKey = null;
function openProfilesModal(groupKey) {
  _profileGroupKey = groupKey;
  const profiles = QUICK_PROFILES[groupKey] || [];
  const list = document.getElementById('profiles-list');
  list.innerHTML = profiles.map((prof, idx) => {
    const previewTotal = prof.items.reduce((s, item) => {
      const cat = CATALOG[item.id];
      const eff = getEffectivePrice(item.id, activeProject());
      return s + (item.qty || 1) * eff;
    }, 0);
    return `
      <button onclick="applyProfile(${idx})"
        class="w-full text-left p-3.5 rounded-2xl border border-slate-100 mb-2 hover:border-brand/30 hover:bg-brand/5 transition-colors">
        <p class="font-semibold text-slate-900 text-sm">${esc(prof.name)}</p>
        <p class="text-xs text-slate-400 mt-0.5">${prof.items.length} items · est. ${fmt(previewTotal)}</p>
      </button>`;
  }).join('') || '<p class="text-sm text-slate-400 text-center py-4">No profiles for this group</p>';
  const modal = document.getElementById('profiles-modal');
  modal.classList.remove('hidden');
  setTimeout(() => document.getElementById('profiles-box').classList.add('open'), 10);
}
function closeProfilesModal() {
  document.getElementById('profiles-box').classList.remove('open');
  setTimeout(() => document.getElementById('profiles-modal').classList.add('hidden'), 300);
}
function applyProfile(idx) {
  const project = activeProject();
  if (!project || !_profileGroupKey) return;
  const profile = QUICK_PROFILES[_profileGroupKey]?.[idx];
  if (!profile) return;
  closeProfilesModal();
  updateProject(project.id, p => {
    const room = p.rooms.find(r => r.id === state.activeRoomId);
    if (!room) return;
    const g = room.groups.find(g => g.key === _profileGroupKey);
    if (!g) return;
    g.noActionNeeded = false;
    profile.items.forEach(({ id: catId, qty }) => {
      const existing = g.items.find(i => i.catalogId === catId);
      if (existing) { existing.qty = qty; }
      else {
        const cat = CATALOG[catId];
        if (!cat) return;
        const eff = getEffectivePrice(catId, p);
        g.items.push({ id: uid(), catalogId: catId, name: cat.name, qty, unitCost: eff, unit: cat.unit, notes: '', photos: [], year: null, serialNumber: null, isCustom: false });
      }
    });
    g.reviewed = g.items.length > 0;
  });
  render();
}

// ── Price CSV Upload ──

function handlePriceCSV(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').map(l => l.trim()).filter(Boolean);
    let updated = 0;
    lines.slice(1).forEach(line => {
      const [id, , cost] = line.split(',').map(s => s.replace(/"/g, '').trim());
      const num = parseFloat(cost);
      if (id && !isNaN(num) && CATALOG[id]) {
        state.globalPriceOverrides[id] = num;
        applyGlobalPriceToProjects(id, num);
        updated++;
      }
    });
    saveState();
    render();
    alert(`Updated ${updated} prices from CSV.`);
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Rolls a global price change out to every already-selected line item
// across all projects, unless that project has its own per-project
// override for the same catalog item (project overrides always win).
function applyGlobalPriceToProjects(itemId, newPrice) {
  state.projects.forEach(project => {
    if (project.priceOverrides?.[itemId] !== undefined) return;
    let touched = false;
    project.rooms.forEach(room => {
      room.groups.forEach(g => {
        g.items.forEach(item => {
          if (item.catalogId === itemId) { item.unitCost = newPrice; touched = true; }
        });
      });
    });
    if (touched) project.updatedAt = Date.now();
  });
}

function resetGlobalPrices() {
  openConfirm('Reset Prices', 'Reset all global price overrides to defaults? Per-project overrides are not affected.', 'Reset', 'bg-red-500', () => {
    state.globalPriceOverrides = {};
    saveState();
    render();
  });
}

// ── Backup / Restore ──

function backupData() {
  const backup = JSON.stringify({ projects: state.projects, globalPriceOverrides: state.globalPriceOverrides, version: 2, date: new Date().toISOString() }, null, 2);
  const blob = new Blob([backup], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `spark-estimator-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function restoreData(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    openConfirm('Restore Backup', 'This will overwrite all current projects with the backup. Continue?', 'Restore', 'bg-brand', () => {
      try {
        const data = JSON.parse(e.target.result);
        state.projects = data.projects || [];
        state.globalPriceOverrides = data.globalPriceOverrides || {};
        state.activeProjectId = state.projects[0]?.id || null;
        saveState();
        navigate('dashboard');
        alert('Backup restored successfully.');
      } catch(err) {
        alert('Failed to restore backup: ' + err.message);
      }
    });
  };
  reader.readAsText(file);
  event.target.value = '';
}

loadState();
render();

// iOS Safari only honors the CSS :active pseudo-class on tap if some
// touch listener is registered on the page — otherwise taps behave like
// clicks with no pressed state at all. This is a no-op listener purely to
// unlock :active-based press feedback (see the <style> block) on iPhone.
document.addEventListener('touchstart', function(){}, { passive: true });

// PWA service worker registration
if ('serviceWorker' in navigator) {
  // If a SW was already controlling this page load, any later
  // 'controllerchange' means a newer deployed version just took over in the
  // background — surface that instead of leaving agents stuck on stale code
  // until they happen to force-refresh. (No banner on a first-ever visit,
  // since there's no previous controller to have changed from.)
  const hadController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (hadController) document.getElementById('update-banner')?.classList.remove('hidden');
  });
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
