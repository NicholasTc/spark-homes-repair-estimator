<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spark Estimator" />
  <meta name="theme-color" content="#0f172a" />
  <title>Spark Homes Estimator</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
  <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { brand: { DEFAULT:'#ea580c', dark:'#c2410c', light:'#fed7aa', faint:'#fff7ed' } },
        fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','Segoe UI','Helvetica Neue','sans-serif'] },
      }}
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    *{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
    html,body{height:100%;overscroll-behavior:none;overflow:hidden}
    body{margin:0;background:#f1f5f9}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    .scroll-y{overflow-y:auto;-webkit-overflow-scrolling:touch}
    .safe-bottom{padding-bottom:max(16px,env(safe-area-inset-bottom))}
    .safe-top{padding-top:max(0px,env(safe-area-inset-top))}
    .pt-safe{padding-top:max(0px,env(safe-area-inset-top))}
    #side-panel{transition:transform .28s cubic-bezier(.4,0,.2,1)}
    .sheet{transition:transform .3s cubic-bezier(.4,0,.2,1);transform:translateY(100%)}
    .sheet.open{transform:translateY(0)}
    .fade-in{animation:fadeIn .18s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .progress-bar-fill{transition:width .4s ease}
    .badge-pulse{animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .drag-over{border:2px dashed #ea580c !important}
    input:focus,textarea:focus,select:focus{outline:none}
    .tab-active svg,.tab-active span{color:#ea580c}
    .item-row-enter{animation:rowEnter .2s ease}
    @keyframes rowEnter{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
  </style>
</head>
<body class="bg-slate-100">

<!-- ═══ OVERLAY LAYER (outside #app — never clobbered by render) ═══ -->
<div id="overlay-layer">

  <!-- Side Panel -->
  <div id="panel-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="closePanel()"></div>
  <div id="side-panel" class="fixed top-0 left-0 h-full w-72 bg-white z-50 shadow-2xl -translate-x-full flex flex-col">
    <div class="bg-slate-900 text-white px-4 pt-safe pb-4 flex-shrink-0">
      <div class="flex justify-between items-center mt-3">
        <span class="font-bold text-base tracking-tight">Projects</span>
        <button onclick="closePanel()" class="text-slate-400 text-xl w-8 h-8 flex items-center justify-center">✕</button>
      </div>
    </div>
    <div class="flex-1 scroll-y" id="panel-list"></div>
    <div class="p-4 border-t border-slate-100 flex flex-col gap-2 flex-shrink-0 safe-bottom">
      <button onclick="closePanel();navigate('settings')" class="w-full py-3 rounded-xl text-slate-600 text-sm font-medium border border-slate-200 bg-slate-50">⚙ Settings & Backup</button>
      <button onclick="closePanel();navigate('project-setup')" class="w-full py-3.5 rounded-xl bg-brand text-white font-semibold text-sm">+ New Project</button>
    </div>
  </div>

  <!-- Generic Confirm Modal -->
  <div id="confirm-modal" class="fixed inset-0 z-[70] hidden">
    <div class="absolute inset-0 bg-black/60" onclick="closeConfirm()"></div>
    <div class="absolute inset-0 flex items-end justify-center p-0 pointer-events-none">
      <div id="confirm-box" class="bg-white rounded-t-2xl w-full max-w-md p-6 pointer-events-auto safe-bottom sheet">
        <p id="confirm-title" class="font-bold text-slate-900 text-lg mb-2"></p>
        <p id="confirm-body" class="text-slate-500 text-sm mb-6"></p>
        <div class="flex gap-3">
          <button onclick="closeConfirm()" class="flex-1 py-3 rounded-xl border-2 border-slate-200 text-slate-600 font-semibold text-sm">Cancel</button>
          <button id="confirm-ok" class="flex-1 py-3 rounded-xl bg-red-500 text-white font-semibold text-sm">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Price Override Modal -->
  <div id="price-modal" class="fixed inset-0 z-[70] hidden">
    <div class="absolute inset-0 bg-black/60" onclick="closePriceModal()"></div>
    <div class="absolute inset-0 flex items-end justify-center pointer-events-none">
      <div id="price-box" class="bg-white rounded-t-2xl w-full max-w-md pointer-events-auto safe-bottom sheet">
        <div class="px-5 pt-5 pb-3 border-b border-slate-100">
          <p class="font-bold text-slate-900 text-lg" id="price-modal-title">Override Price</p>
          <p class="text-xs text-slate-400 mt-1" id="price-modal-sub"></p>
        </div>
        <div class="px-5 py-5">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">New Unit Cost ($)</label>
          <input id="price-input" type="number" inputmode="decimal" step="0.01"
            class="mt-2 w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-lg font-semibold focus:border-brand text-slate-900"
            placeholder="0.00" />
          <div class="mt-4 space-y-2">
            <button id="price-project-btn" class="w-full py-3 rounded-xl bg-brand text-white font-semibold text-sm">Apply to this project only</button>
            <button id="price-global-btn" class="w-full py-3 rounded-xl border-2 border-slate-200 text-slate-700 font-semibold text-sm">Update standard price globally</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Photo Lightbox -->
  <div id="photo-lightbox" class="fixed inset-0 z-[80] hidden bg-black/90 flex items-center justify-center p-4">
    <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white text-2xl w-10 h-10 flex items-center justify-center bg-white/20 rounded-full">✕</button>
    <img id="lightbox-img" src="" alt="" class="max-w-full max-h-full rounded-xl object-contain" />
    <button id="lightbox-delete" class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-xl font-semibold text-sm">Delete Photo</button>
  </div>

  <!-- OCR Result Modal -->
  <div id="ocr-modal" class="fixed inset-0 z-[75] hidden">
    <div class="absolute inset-0 bg-black/60" onclick="closeOcrModal()"></div>
    <div class="absolute inset-0 flex items-end justify-center pointer-events-none">
      <div class="bg-white rounded-t-2xl w-full max-w-md p-5 pointer-events-auto safe-bottom sheet" id="ocr-box">
        <p class="font-bold text-slate-900 text-base mb-1">🔍 Serial Number Detected</p>
        <p class="text-xs text-slate-400 mb-3">Confirm or edit the extracted text</p>
        <input id="ocr-input" type="text" class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-base font-mono focus:border-brand text-slate-900" />
        <div class="flex gap-3 mt-4">
          <button onclick="closeOcrModal()" class="flex-1 py-3 rounded-xl border-2 border-slate-200 text-slate-600 font-semibold text-sm">Skip</button>
          <button id="ocr-save-btn" class="flex-1 py-3 rounded-xl bg-brand text-white font-semibold text-sm">Save Serial #</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Item Modal -->
  <div id="custom-modal" class="fixed inset-0 z-[70] hidden">
    <div class="absolute inset-0 bg-black/60" onclick="closeCustomModal()"></div>
    <div class="absolute inset-0 flex items-end justify-center pointer-events-none">
      <div class="bg-white rounded-t-2xl w-full max-w-md p-5 pointer-events-auto safe-bottom sheet" id="custom-box">
        <p class="font-bold text-slate-900 text-lg mb-4">Add Custom Item</p>
        <div class="space-y-3">
          <input id="ci-name" type="text" placeholder="Item name" class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-brand" />
          <div class="flex gap-3">
            <input id="ci-cost" type="number" inputmode="decimal" placeholder="Unit cost ($)" class="flex-1 border-2 border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-brand" />
            <input id="ci-unit" type="text" placeholder="Unit (ea., sqft...)" class="flex-1 border-2 border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-brand" />
          </div>
          <input id="ci-qty" type="number" inputmode="decimal" placeholder="Quantity" class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-brand" />
        </div>
        <div class="flex gap-3 mt-4">
          <button onclick="closeCustomModal()" class="flex-1 py-3 rounded-xl border-2 border-slate-200 text-slate-600 font-semibold text-sm">Cancel</button>
          <button onclick="saveCustomItem()" class="flex-1 py-3 rounded-xl bg-brand text-white font-semibold text-sm">Add Item</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Profiles Sheet -->
  <div id="profiles-modal" class="fixed inset-0 z-[70] hidden">
    <div class="absolute inset-0 bg-black/60" onclick="closeProfilesModal()"></div>
    <div class="absolute inset-0 flex items-end justify-center pointer-events-none">
      <div class="bg-white rounded-t-2xl w-full max-w-md pointer-events-auto safe-bottom sheet" id="profiles-box">
        <div class="px-5 pt-5 pb-3 border-b border-slate-100 flex justify-between">
          <p class="font-bold text-slate-900 text-base">Quick Profiles</p>
          <button onclick="closeProfilesModal()" class="text-slate-400 text-lg">✕</button>
        </div>
        <div id="profiles-list" class="px-4 py-3 scroll-y max-h-80"></div>
      </div>
    </div>
  </div>

  <!-- Rename Project Sheet -->
  <div id="rename-modal" class="fixed inset-0 z-[70] hidden">
    <div class="absolute inset-0 bg-black/60" onclick="closeRenameModal()"></div>
    <div class="absolute inset-0 flex items-end justify-center pointer-events-none">
      <div class="bg-white rounded-t-2xl w-full max-w-md p-5 pointer-events-auto safe-bottom sheet" id="rename-box">
        <p class="font-bold text-slate-900 text-lg mb-4">Rename Project</p>
        <input id="rename-input" type="text" placeholder="Project name"
          class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-brand text-slate-900"
          autocomplete="off" onkeydown="if(event.key==='Enter')saveRename()" />
        <div class="flex gap-3 mt-4">
          <button onclick="closeRenameModal()" class="flex-1 py-3 rounded-xl border-2 border-slate-200 text-slate-600 font-semibold text-sm">Cancel</button>
          <button onclick="saveRename()" class="flex-1 py-3 rounded-xl bg-brand text-white font-semibold text-sm">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Room Sheet -->
  <div id="room-modal" class="fixed inset-0 z-[70] hidden">
    <div class="absolute inset-0 bg-black/60" onclick="closeRoomModal()"></div>
    <div class="absolute inset-0 flex items-end justify-center pointer-events-none">
      <div class="bg-white rounded-t-2xl w-full max-w-md pointer-events-auto safe-bottom sheet" id="room-box">
        <div class="px-5 pt-5 pb-3 border-b border-slate-100 flex justify-between items-center">
          <p class="font-bold text-slate-900 text-base">Add a Room</p>
          <button onclick="closeRoomModal()" class="text-slate-400 text-lg">✕</button>
        </div>
        <div id="room-modal-list" class="px-5 py-4 scroll-y max-h-[70vh]"></div>
      </div>
    </div>
  </div>

</div>
<!-- ═══ END OVERLAY LAYER ═══ -->

<!-- Storage / global toast banner -->
<div id="toast-banner" class="fixed top-0 left-0 right-0 z-[90] hidden pt-safe">
  <div class="px-3 pt-3">
    <div class="bg-amber-500 text-white rounded-xl shadow-lg px-4 py-3 flex items-start gap-2.5 max-w-md mx-auto">
      <span class="text-base flex-shrink-0">⚠</span>
      <p id="toast-banner-msg" class="text-xs font-medium leading-snug flex-1"></p>
      <button onclick="hideToast()" class="text-white/80 text-sm flex-shrink-0 leading-none">✕</button>
    </div>
  </div>
</div>

<div id="app" class="h-full flex flex-col"></div>

const SK = 'spark_v2';
const SK_GLOBAL = 'spark_globals_v2';

let state = {
  view: 'dashboard',
  activeProjectId: null,
  activeRoomId: null,
  activeGroupKey: null,
  projects: [],
  globalPriceOverrides: {},
  // transient context (not persisted)
  _pendingPriceItem: null,
  _pendingPhotoCtx: null,
  _ocrCtx: null,
};

function loadState() {
  try {
    const raw = localStorage.getItem(SK);
    const globals = localStorage.getItem(SK_GLOBAL);
    if (raw) {
      const saved = JSON.parse(raw);
      state.projects = saved.projects || [];
      state.activeProjectId = saved.activeProjectId || null;
      state.view = saved.view || 'dashboard';
      state.activeRoomId = saved.activeRoomId || null;
      state.activeGroupKey = saved.activeGroupKey || null;
    }
    if (globals) {
      const g = JSON.parse(globals);
      state.globalPriceOverrides = g.priceOverrides || {};
    }
  } catch(e) { console.error('loadState:', e); }
}

function stripPhotosFromProject(p) {
  return {
    ...p, rooms: p.rooms.map(r => ({
      ...r, groups: r.groups.map(g => ({
        ...g, items: g.items.map(i => ({ ...i, photos:[] })),
        groupPhotos: [],
      }))
    }))
  };
}

function saveState() {
  try {
    const toSave = {
      projects: state.projects,
      activeProjectId: state.activeProjectId,
      view: state.view,
      activeRoomId: state.activeRoomId,
      activeGroupKey: state.activeGroupKey,
    };
    try {
      localStorage.setItem(SK, JSON.stringify(toSave));
    } catch(e) {
      // Storage quota exceeded. First, try dropping photos from only the
      // project currently being worked on (least destructive) — other
      // projects' photos are left untouched.
      const activeId = state.activeProjectId;
      const scoped = { ...toSave, projects: state.projects.map(p =>
        p.id === activeId ? stripPhotosFromProject(p) : p
      ) };
      try {
        localStorage.setItem(SK, JSON.stringify(scoped));
        state.projects = scoped.projects;
        showToast('Storage is nearly full — photos for the current project could not be saved. Export this project soon to back up your data, or delete older projects to free up space.');
      } catch(e2) {
        // Still over quota — fall back to stripping photos from every project.
        const stripped = { ...toSave, projects: state.projects.map(stripPhotosFromProject) };
        localStorage.setItem(SK, JSON.stringify(stripped));
        state.projects = stripped.projects;
        showToast('Storage is full — photos across all projects could not be saved. Export your projects now to avoid losing photo data, then delete old projects to free up space.');
      }
    }
    localStorage.setItem(SK_GLOBAL, JSON.stringify({ priceOverrides: state.globalPriceOverrides }));
  } catch(e) { console.error('saveState:', e); }
}

let _toastTimer = null;
function showToast(msg) {
  const banner = document.getElementById('toast-banner');
  const msgEl = document.getElementById('toast-banner-msg');
  if (!banner || !msgEl) return;
  msgEl.textContent = msg;
  banner.classList.remove('hidden');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(hideToast, 10000);
}
function hideToast() {
  document.getElementById('toast-banner')?.classList.add('hidden');
  clearTimeout(_toastTimer);
}

function setState(patch, skipRender) {
  Object.assign(state, patch);
  saveState();
  if (!skipRender) render();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(n) { return '$' + (n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

async function compressPhoto(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        const r = Math.min(MAX / img.width, MAX / img.height, 1);
        const c = document.createElement('canvas');
        c.width = Math.round(img.width * r);
        c.height = Math.round(img.height * r);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', 0.65));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

let tesseractLoaded = false;
async function runOCR(dataUrl) {
  try {
    if (!tesseractLoaded) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        s.onload = res; s.onerror = () => rej(new Error('tesseract script failed to load'));
        document.head.appendChild(s);
      });
      tesseractLoaded = true;
    }
    const worker = await Tesseract.createWorker('eng');
    const { data: { text } } = await worker.recognize(dataUrl);
    await worker.terminate();
    return text;
  } catch(e) {
    // Not fatal — likely offline with assets not yet cached. Fails silently.
    return null;
  }
}

function parseSerial(text) {
  if (!text) return null;
  const patterns = [
    /(?:s\/n|serial\s*(?:no\.?|number)?)\s*[:\-#]?\s*([A-Z0-9][A-Z0-9\-\/]{5,20})/i,
    /(?:model|mod\.?)\s*[:\-#]?\s*([A-Z0-9][A-Z0-9\-\/]{4,20})/i,
    /\b([A-Z]{1,4}[0-9]{5,14})\b/,
    /\b([0-9]{8,14})\b/,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m) return m[1].trim().toUpperCase();
  }
  return null;
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return 'just now';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

function formatDuration(ms) {
  if (!ms) return '';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h ${m % 60}m`;
  return `${m}m`;
}

function navigate(view, extra = {}) {
  setState({ view, ...extra });
}

function activeProject() {
  return state.projects.find(p => p.id === state.activeProjectId) || null;
}

function getEffectivePrice(itemId, project) {
  if (project?.priceOverrides?.[itemId] !== undefined) return project.priceOverrides[itemId];
  if (state.globalPriceOverrides[itemId] !== undefined) return state.globalPriceOverrides[itemId];
  return CATALOG[itemId]?.cost ?? 0;
}

function isPriceOverridden(itemId, project) {
  return project?.priceOverrides?.[itemId] !== undefined || state.globalPriceOverrides[itemId] !== undefined;
}

function getProjectTotal(project) {
  if (!project) return 0;
  return project.rooms.reduce((sum, room) =>
    sum + room.groups.reduce((s, g) =>
      s + g.items.reduce((t, item) => t + (item.qty || 0) * (item.unitCost || 0), 0), 0), 0);
}

function getProgress(project) {
  if (!project) return { reviewed: 0, total: 0, pct: 0 };
  const allGroups = project.rooms.flatMap(r => r.groups);
  const total = allGroups.length;
  const reviewed = allGroups.filter(g => g.reviewed).length;
  return { reviewed, total, pct: total ? Math.round(reviewed / total * 100) : 0 };
}

function getProjectStatus(project) {
  if (!project.walkthroughStartedAt) return { key:'not_started', label:'Not Started', classes:'bg-slate-100 text-slate-500' };
  const pct = getProgress(project).pct;
  if (pct >= 100) return { key:'complete', label:'Complete', classes:'bg-green-100 text-green-700' };
  return { key:'in_progress', label:'In Progress', classes:'bg-amber-100 text-amber-700' };
}

function createGroupState(groupKey) {
  return { key: groupKey, reviewed: false, noActionNeeded: false, items: [], groupPhotos: [] };
}

function createRoom(type, label, order) {
  const rt = ROOM_TYPE_MAP[type];
  return {
    id: uid(), type, label, order,
    condition: null,
    notes: '',
    groups: rt.groupKeys.map(k => createGroupState(k)),
  };
}

function setRoomNotes(projectId, roomId, notes) {
  updateProject(projectId, p => {
    const room = p.rooms.find(r => r.id === roomId);
    if (room) room.notes = notes;
  });
}

function setProjectNotes(projectId, notes) {
  updateProject(projectId, p => { p.notes = notes; });
}

function renameProject(projectId, newName) {
  const name = (newName || '').trim();
  if (!name) return;
  updateProject(projectId, p => { p.name = name; });
  render();
}

function createProject(name, address, roomConfigs) {
  const now = Date.now();
  const rooms = [];
  const counters = {};
  const sortedConfigs = [...roomConfigs].sort((a, b) => {
    const ao = ROOM_TYPE_MAP[a.type]?.walkthroughOrder || 99;
    const bo = ROOM_TYPE_MAP[b.type]?.walkthroughOrder || 99;
    return ao - bo;
  });
  sortedConfigs.forEach((cfg, idx) => {
    const rt = ROOM_TYPE_MAP[cfg.type];
    if (!rt) return;
    const count = (counters[cfg.type] = (counters[cfg.type] || 0) + 1);
    const label = rt.multi ? `${rt.label} ${count}` : rt.label;
    rooms.push(createRoom(cfg.type, label, idx));
  });
  return {
    id: uid(), name: name.trim(), address: (address||'').trim(),
    createdAt: now, updatedAt: now,
    rooms,
    priceOverrides: {},
    dealAnalyzer: { arv:0, targetProfit:30000, holdingCosts:18000, sellingCosts:0, purchasePrice:0 },
    notes: '',
    walkthroughStartedAt: null,
    walkthroughDuration: 0,
  };
}

function getRoomById(project, roomId) {
  return project?.rooms?.find(r => r.id === roomId);
}

function getGroupState(room, groupKey) {
  return room?.groups?.find(g => g.key === groupKey);
}

function getLineItemById(groupState, itemId) {
  return groupState?.items?.find(i => i.id === itemId);
}

function getSelectedCatalogItem(groupState, catalogId) {
  return groupState?.items?.find(i => i.catalogId === catalogId);
}

function updateProject(projectId, updater) {
  const idx = state.projects.findIndex(p => p.id === projectId);
  if (idx < 0) return;
  const p = deepClone(state.projects[idx]);
  updater(p);
  p.updatedAt = Date.now();
  state.projects[idx] = p;
  saveState();
}

function updateGroupStateIn(project, roomId, groupKey, updater) {
  const room = project.rooms.find(r => r.id === roomId);
  if (!room) return;
  const g = room.groups.find(g => g.key === groupKey);
  if (!g) return;
  updater(g, room);
}

// Toggle a catalog item in a group (check/uncheck)
function toggleItemInGroup(projectId, roomId, groupKey, catalogId) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const existing = getSelectedCatalogItem(g, catalogId);
      if (existing) {
        g.items = g.items.filter(i => i.catalogId !== catalogId);
      } else {
        const cat = CATALOG[catalogId];
        const eff = getEffectivePrice(catalogId, p);
        g.items.push({
          id: uid(), catalogId, name: cat.name, unit: cat.unit,
          qty: cat.defaultQty || 0, unitCost: eff,
          notes: '', photos: [], year: null, serialNumber: null, isCustom: false,
        });
      }
      g.noActionNeeded = false;
      g.reviewed = g.noActionNeeded || g.items.length > 0;
    });
  });
}

function setGroupNAN(projectId, roomId, groupKey, value) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      g.noActionNeeded = value;
      if (value) { g.items = []; g.reviewed = true; }
      else g.reviewed = false;
    });
  });
}

function setItemQty(projectId, roomId, groupKey, lineItemId, qty) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const item = g.items.find(i => i.id === lineItemId);
      if (item) { item.qty = parseFloat(qty) || 0; g.reviewed = true; }
    });
  });
}

function setItemNotes(projectId, roomId, groupKey, lineItemId, notes) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const item = g.items.find(i => i.id === lineItemId);
      if (item) item.notes = notes;
    });
  });
}

function setItemYear(projectId, roomId, groupKey, lineItemId, year) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const item = g.items.find(i => i.id === lineItemId);
      if (item) item.year = year;
    });
  });
}

function setRoomCondition(projectId, roomId, condition) {
  updateProject(projectId, p => {
    const room = p.rooms.find(r => r.id === roomId);
    if (room) room.condition = condition;
  });
}

function addPhotoToItem(projectId, roomId, groupKey, lineItemId, photo) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      const item = g.items.find(i => i.id === lineItemId);
      if (item) item.photos.push(photo);
    });
  });
}

function addPhotoToGroup(projectId, roomId, groupKey, photo) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => { g.groupPhotos.push(photo); });
  });
}

function deletePhoto(projectId, roomId, groupKey, lineItemId, photoId) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      if (lineItemId === 'group') {
        g.groupPhotos = g.groupPhotos.filter(ph => ph.id !== photoId);
      } else {
        const item = g.items.find(i => i.id === lineItemId);
        if (item) item.photos = item.photos.filter(ph => ph.id !== photoId);
      }
    });
  });
}

function deleteLineItem(projectId, roomId, groupKey, lineItemId) {
  updateProject(projectId, p => {
    updateGroupStateIn(p, roomId, groupKey, g => {
      g.items = g.items.filter(i => i.id !== lineItemId);
      g.reviewed = g.noActionNeeded || g.items.length > 0;
    });
  });
}

function duplicateProject(projectId) {
  const src = state.projects.find(p => p.id === projectId);
  if (!src) return;
  const copy = deepClone(src);
  copy.id = uid();
  copy.name = src.name + ' (Copy)';
  copy.createdAt = Date.now();
  copy.updatedAt = Date.now();
  // clear selections, keep room structure
  copy.rooms.forEach(r => {
    r.condition = null;
    r.groups.forEach(g => {
      g.reviewed = false; g.noActionNeeded = false;
      g.items = []; g.groupPhotos = [];
    });
  });
  copy.dealAnalyzer = { arv:0, targetProfit:30000, holdingCosts:18000, sellingCosts:0, purchasePrice:0 };
  copy.notes = '';
  copy.walkthroughStartedAt = null;
  copy.walkthroughDuration = 0;
  state.projects.push(copy);
  setState({ activeProjectId: copy.id, view:'walkthrough' });
}

// ═══════════════════════════════════════════════════════════════════════════
// 5. SPARKCHECK ENGINE
// ═══════════════════════════════════════════════════════════════════════════

function runSparkCheck(project) {
  if (!project) return [];
  const issues = [];
  const total = getProjectTotal(project);
  const bedroomCount = project.rooms.filter(r => r.type === 'bedroom').length;

  // Helper: find a room's group state
  const getGS = (roomType, groupKey) => {
    const room = project.rooms.find(r => r.type === roomType);
    return room ? getGroupState(room, groupKey) : null;
  };
  const getGSById = (roomId, groupKey) => {
    const room = project.rooms.find(r => r.id === roomId);
    return room ? getGroupState(room, groupKey) : null;
  };

  // ── Critical: Systems must be reviewed ──
  const hvac = getGS('systems', 'as:hvac');
  if (!hvac?.reviewed) issues.push({ level:'critical', msg:'HVAC not reviewed — furnace, A/C, and water heater can each cost $1,400–$4,700', roomType:'systems', groupKey:'as:hvac' });

  const elec = getGS('systems', 'as:electrical');
  if (!elec?.reviewed) issues.push({ level:'critical', msg:'Electrical not reviewed — full rewire can cost $5,000–$15,000+', roomType:'systems', groupKey:'as:electrical' });

  const struct = getGS('systems', 'as:structural');
  if (!struct?.reviewed) issues.push({ level:'critical', msg:'Structural not reviewed — foundation issues can cost $3,000–$30,000+', roomType:'systems', groupKey:'as:structural' });

  // ── Critical: Roof item selected without photos ──
  const roofItem = struct?.items?.find(i => i.catalogId === 'as-16');
  if (roofItem && roofItem.photos.length === 0) {
    issues.push({ level:'critical', msg:'Roof selected but no photos attached — photo each side required', roomType:'systems', groupKey:'as:structural' });
  }

  // ── Warning: HVAC items without serial photos ──
  if (hvac?.reviewed && !hvac.noActionNeeded) {
    const hvacItems = hvac.items || [];
    ['as-01','as-02','as-08'].forEach(catId => {
      const it = hvacItems.find(i => i.catalogId === catId);
      if (it) {
        if (it.photos.length === 0) issues.push({ level:'warning', msg:`${it.name} selected — serial number photo required`, roomType:'systems', groupKey:'as:hvac' });
        if (!it.year) issues.push({ level:'warning', msg:`${it.name} — year not recorded`, roomType:'systems', groupKey:'as:hvac' });
      }
    });
  }

  // ── Warning: Bathroom tub groups with no photos ──
  project.rooms.filter(r => r.type === 'bathroom').forEach(room => {
    const tub = getGroupState(room, 'ba:tub');
    if (tub?.items?.length > 0) {
      const hasPhoto = tub.items.some(i => i.photos.length > 0);
      if (!hasPhoto) issues.push({ level:'warning', msg:`${room.label}: Tub/Shower items selected — add a photo`, roomId: room.id, groupKey:'ba:tub' });
    }
    const tile = getGroupState(room, 'ba:tile');
    if (!tile?.reviewed) issues.push({ level:'warning', msg:`${room.label}: Tile group not reviewed`, roomId: room.id, groupKey:'ba:tile' });
  });

  // ── Warning: Kitchen appliances without photos ──
  const ktAppl = project.rooms.find(r => r.type === 'kitchen');
  if (ktAppl) {
    const applGroup = getGroupState(ktAppl, 'kt:appliances');
    if (applGroup?.items?.length > 0) {
      const hasPhoto = applGroup.items.some(i => i.photos.length > 0) || applGroup.groupPhotos?.length > 0;
      if (!hasPhoto) issues.push({ level:'warning', msg:'Kitchen appliances selected — add condition photos', roomId: ktAppl.id, groupKey:'kt:appliances' });
    }
  }

  // ── Warning: Items with qty = 0 ──
  project.rooms.forEach(room => {
    room.groups.forEach(g => {
      g.items.forEach(item => {
        if (item.qty === 0 && !item.isCustom) {
          issues.push({ level:'warning', msg:`"${item.name}" is checked but has no quantity`, roomId: room.id, groupKey: g.key });
        }
      });
    });
  });

  // ── Warning: Line total below catalog minimum ──
  project.rooms.forEach(room => {
    room.groups.forEach(g => {
      g.items.forEach(item => {
        const cat = item.catalogId ? CATALOG[item.catalogId] : null;
        if (cat?.min && item.qty > 0 && (item.qty * item.unitCost) < cat.min) {
          issues.push({ level:'warning', msg:`"${item.name}" in ${room.label} totals ${fmt(item.qty * item.unitCost)}, below the typical minimum of ${fmt(cat.min)}`, roomId: room.id, groupKey: g.key });
        }
      });
    });
  });

  // ── Info: Exterior photos missing ──
  const extRoom = project.rooms.find(r => r.type === 'exterior');
  if (extRoom) {
    const hasAnyExtPhoto = extRoom.groups.some(g => g.groupPhotos?.length > 0 || g.items.some(i => i.photos.length > 0));
    if (!hasAnyExtPhoto) issues.push({ level:'info', msg:'No exterior photos attached', roomId: extRoom.id });
  }

  // ── Info: Rooms added but not started ──
  project.rooms.forEach(room => {
    const allUnreviewed = room.groups.every(g => !g.reviewed);
    if (allUnreviewed) issues.push({ level:'info', msg:`${room.label} not started`, roomId: room.id });
  });

  // ── Info: Estimate seems low for property size ──
  if (bedroomCount >= 3 && total < 12000 && total > 0) {
    issues.push({ level:'info', msg:`Estimate of ${fmt(total)} seems low for a ${bedroomCount}-bed property — typical range $25k–$65k` });
  }

  return issues;
}

// ═══════════════════════════════════════════════════════════════════════════
// 6. DEAL ANALYZER
// ═══════════════════════════════════════════════════════════════════════════

function analyzeDeal(project) {
  if (!project) return null;
  const da = project.dealAnalyzer || {};
  const repair = getProjectTotal(project);
  const arv = da.arv || 0;
  const targetProfit = da.targetProfit || 0;
  const holdingCosts = da.holdingCosts || 0;
  const sellingCosts = da.sellingCosts || 0;
  const purchasePrice = da.purchasePrice || 0;

  const maxOffer = arv - repair - targetProfit - holdingCosts - sellingCosts;
  const estimatedProfit = arv - purchasePrice - repair - holdingCosts - sellingCosts;
  const redThreshold = arv - targetProfit - holdingCosts - sellingCosts; // max repair budget before red

  let confidence = 'red';
  if (estimatedProfit >= targetProfit) confidence = 'green';
  else if (estimatedProfit >= 0) confidence = 'yellow';

  return { repair, arv, maxOffer, estimatedProfit, targetProfit, redThreshold, confidence };
}

// 7. EXPORT ENGINE (Excel + ZIP)
// ═══════════════════════════════════════════════════════════════════════════

function buildExcel(project) {
  const wb = XLSX.utils.book_new();
  const deal = analyzeDeal(project);

  // ── Summary Sheet ──
  const summaryRows = [
    ['SPARK HOMES — REPAIR ESTIMATE'],
    [],
    ['Project', project.name],
    ['Address', project.address || '—'],
    ['Date', new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' })],
    ['Total Estimate', getProjectTotal(project)],
    ...(project.notes && project.notes.trim() ? [[], ['Project Notes', project.notes.trim()]] : []),
    [],
    ['DEAL ANALYZER'],
    ['ARV', project.dealAnalyzer?.arv || 0],
    ['Repair Estimate', getProjectTotal(project)],
    ['Target Profit', project.dealAnalyzer?.targetProfit || 0],
    ['Holding Costs', project.dealAnalyzer?.holdingCosts || 0],
    ['Selling Costs', project.dealAnalyzer?.sellingCosts || 0],
    ['Purchase Price', project.dealAnalyzer?.purchasePrice || 0],
    [],
    ['Max Offer', deal?.maxOffer || 0],
    ['Estimated Profit', deal?.estimatedProfit || 0],
    ['Deal Confidence', (deal?.confidence || 'N/A').toUpperCase()],
  ];
  const summarySheet = XLSX.utils.aoa_to_sheet(summaryRows);
  summarySheet['!cols'] = [{ wch: 24 }, { wch: 20 }];
  XLSX.utils.book_append_sheet(wb, summarySheet, 'Summary');

  // ── One sheet per room ──
  project.rooms.forEach(room => {
    const rows = [];
    if (room.condition) rows.push(['Condition', room.condition.toUpperCase()]);
    if (room.notes && room.notes.trim()) rows.push(['Room Notes', room.notes.trim()]);
    if (rows.length) rows.push([]);
    rows.push(['Group', 'Item', 'Qty', 'Unit', 'Unit Cost', 'Line Total', 'Notes']);
    let hasItems = false;
    let roomTotal = 0;
    room.groups.forEach(g => {
      const groupDef = GROUPS[g.key];
      if (g.noActionNeeded) {
        rows.push([groupDef?.label || g.key, 'No Action Needed', '', '', '', '', '']);
        hasItems = true;
      } else {
        g.items.forEach(item => {
          const lineTot = (item.qty || 0) * (item.unitCost || 0);
          roomTotal += lineTot;
          rows.push([
            groupDef?.label || g.key,
            item.name,
            item.qty || 0,
            item.unit,
            item.unitCost || 0,
            lineTot,
            [item.notes, item.year ? `Year: ${item.year}` : '', item.serialNumber ? `S/N: ${item.serialNumber}` : ''].filter(Boolean).join(' | '),
          ]);
          hasItems = true;
        });
      }
    });
    if (hasItems) {
      rows.push([]);
      rows.push(['', '', '', '', 'ROOM TOTAL', roomTotal, '']);
    }
    if (hasItems || (room.notes && room.notes.trim()) || room.condition) {
      const sheet = XLSX.utils.aoa_to_sheet(rows);
      sheet['!cols'] = [{ wch:20 },{ wch:36 },{ wch:8 },{ wch:14 },{ wch:12 },{ wch:12 },{ wch:30 }];
      if (hasItems) {
        const totalRowNum = rows.length; // 1-indexed Excel row for the last pushed row
        ['E','F'].forEach(col => {
          const ref = `${col}${totalRowNum}`;
          if (sheet[ref]) sheet[ref].s = { font: { bold: true } };
        });
      }
      XLSX.utils.book_append_sheet(wb, sheet, room.label.substring(0, 31));
    }
  });

  return XLSX.write(wb, { bookType:'xlsx', type:'array' });
}

async function exportZip(project) {
  const zip = new JSZip();

  // Excel
  const excelData = buildExcel(project);
  zip.file('estimate.xlsx', excelData);

  // Photos organized by room/group
  project.rooms.forEach(room => {
    const safeRoom = room.label.replace(/[^a-z0-9 ]/gi, '_');
    room.groups.forEach(g => {
      const groupDef = GROUPS[g.key];
      const safeGroup = (groupDef?.label || g.key).replace(/[^a-z0-9 ]/gi, '_');
      const folder = `photos/${safeRoom}/${safeGroup}`;

      // Group-level photos
      (g.groupPhotos || []).forEach((ph, i) => {
        const b64 = ph.dataUrl.split(',')[1];
        zip.file(`${folder}/context_${i+1}.jpg`, b64, { base64: true });
      });

      // Item photos
      g.items.forEach(item => {
        if (item.photos?.length > 0) {
          const safeItem = item.name.replace(/[^a-z0-9 ]/gi, '_').substring(0, 30);
          item.photos.forEach((ph, i) => {
            const b64 = ph.dataUrl.split(',')[1];
            zip.file(`${folder}/${safeItem}_${i+1}.jpg`, b64, { base64: true });
          });
        }
      });
    });
  });

  // Project summary text
  const issues = runSparkCheck(project);
  const deal = analyzeDeal(project);
  const summary = [
    `SPARK HOMES REPAIR ESTIMATE`,
    `Project: ${project.name}`,
    `Address: ${project.address || '—'}`,
    `Date: ${new Date().toLocaleDateString()}`,
    `Total Estimate: ${fmt(getProjectTotal(project))}`,
    ...(project.notes && project.notes.trim() ? ['', `Project Notes: ${project.notes.trim()}`] : []),
    ``,
    `DEAL ANALYZER`,
    `Max Offer: ${fmt(deal?.maxOffer || 0)}`,
    `Estimated Profit: ${fmt(deal?.estimatedProfit || 0)}`,
    `Deal Confidence: ${(deal?.confidence || 'N/A').toUpperCase()}`,
    ``,
    `SPARKCHECK (${issues.length} issues)`,
    ...issues.map(i => `[${i.level.toUpperCase()}] ${i.msg}`),
  ].join('\n');
  zip.file('summary.txt', summary);

  const blob = await zip.generateAsync({ type:'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${project.name.replace(/[^a-z0-9]/gi,'_')}_estimate.zip`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

                    ${!crits && showDealPill ? `<button onclick="event.stopPropagation();setState({activeProjectId:'${p.id}',view:'deal-analyzer'})" class="ml-auto flex items-center gap-1 text-xs font-semibold rounded-full px-2.5 py-1 border ${deal.confidence === 'green' ? 'bg-green-50 text-green-700 border-green-100' : 'bg-amber-50 text-amber-700 border-amber-100'}">${deal.confidence === 'green' ? '🟢' : '🟡'} ${deal.confidence} deal <span class="opacity-40">›</span></button>` : ''}

                </div>

                  <div class="w-px bg-slate-50"></div>
                  <button onclick="event.stopPropagation();duplicateProject('${p.id}')" class="flex-1 py-2.5 text-xs text-slate-400 font-medium">Duplicate</button>
                  <div class="w-px bg-slate-50"></div>
                  <button onclick="event.stopPropagation();confirmDelete('${p.id}')" class="flex-1 py-2.5 text-xs text-red-400 font-medium">Delete</button>
                </div>
              </div>`;
          }).join('')}
        </div>
      `}
    </div>
    ${renderBottomNav()}`;
}

// Room count toggles stored in DOM — read on submit
const _roomCounts = { bedroom:3, bathroom:2 };
const _roomToggles = { kitchen:true, living:true, 'interior-general':false, exterior:true, systems:true };

function setRoomCount(type, n) {
  _roomCounts[type] = n;
  const prefix = type === 'bedroom' ? 'bd' : 'ba';
  document.querySelectorAll(`.room-preset-${prefix}`).forEach(btn => {
    const val = parseInt(btn.dataset.val);
    btn.className = btn.className.replace(/border-brand bg-brand\/5 text-brand|border-slate-200 text-slate-600/g, '');
    btn.classList.add(...(val === n ? ['border-brand','bg-brand/5','text-brand'] : ['border-slate-200','text-slate-600']));
  });
  // picking a preset cancels any custom amount that was being entered
  const manualInput = document.getElementById(`${prefix}-manual`);
  if (manualInput) manualInput.value = '';
  document.getElementById(`${prefix}-manual-wrap`)?.classList.add('hidden');
  document.getElementById(`${prefix}-manual-btn`)?.classList.remove('hidden');
  updateRoomTotal();
}

function revealManualCount(type) {
  const prefix = type === 'bedroom' ? 'bd' : 'ba';
  document.getElementById(`${prefix}-manual-wrap`)?.classList.remove('hidden');
  document.getElementById(`${prefix}-manual-btn`)?.classList.add('hidden');
  document.getElementById(`${prefix}-manual`)?.focus();
}

function setRoomCountManual(type, value) {
  const n = Math.max(0, parseInt(value) || 0);
  _roomCounts[type] = n;
  const prefix = type === 'bedroom' ? 'bd' : 'ba';
  // typing a custom amount deselects the presets
  document.querySelectorAll(`.room-preset-${prefix}`).forEach(btn => {
    btn.className = btn.className.replace(/border-brand bg-brand\/5 text-brand|border-slate-200 text-slate-600/g, '');
    btn.classList.add('border-slate-200','text-slate-600');
  });
  updateRoomTotal();
}

function toggleRoomType(type) {
  _roomToggles[type] = !_roomToggles[type];
  const btn = document.getElementById(`rt-${type}`);
  if (btn) {
    if (_roomToggles[type]) {
      btn.className = btn.className.replace('border-slate-200 text-slate-600','border-brand bg-brand/5 text-brand');
    } else {
      btn.className = btn.className.replace('border-brand bg-brand/5 text-brand','border-slate-200 text-slate-600');
    }
  }
  updateRoomTotal();
}

function computeRoomTotal() {
  let n = _roomCounts.bedroom + _roomCounts.bathroom;
  ['kitchen','living','interior-general','exterior','systems'].forEach(type => { if (_roomToggles[type]) n++; });
  return n;
}

function updateRoomTotal() {
  const el = document.getElementById('room-total-count');
  if (el) el.textContent = `${computeRoomTotal()} rooms total`;
}

function createProjectAndStart() {
  const name = document.getElementById('proj-name')?.value?.trim();
  if (!name) {
    document.getElementById('proj-name')?.focus();
    document.getElementById('proj-name')?.classList.add('border-red-400');
    return;
  }
  const addr = document.getElementById('proj-addr')?.value || '';
  const roomConfigs = [];
  ['exterior','interior-general','living','kitchen'].forEach(type => {
    if (_roomToggles[type]) roomConfigs.push({ type });
  });
  for (let i = 0; i < _roomCounts.bedroom; i++) roomConfigs.push({ type:'bedroom' });
  for (let i = 0; i < _roomCounts.bathroom; i++) roomConfigs.push({ type:'bathroom' });
  if (_roomToggles.systems) roomConfigs.push({ type:'systems' });
  const project = createProject(name, addr, roomConfigs);
  // Walkthrough is not auto-started — the agent taps "Start Walkthrough" on the project screen.
  state.projects.push(project);
  setState({ activeProjectId: project.id, view:'walkthrough' });
}

function startWalkthrough() {
  const project = activeProject();
  if (!project) return;
  updateProject(project.id, p => { p.walkthroughStartedAt = Date.now(); });
  render();
}

// ── WALKTHROUGH ──

function renderWalkthrough() {
  const project = activeProject();
  if (!project) return renderNeedsProject();
  const prog = getProgress(project);
  const issues = runSparkCheck(project);
  const crits = issues.filter(i => i.level === 'critical');
  const started = !!project.walkthroughStartedAt;
  const duration = started
    ? Date.now() - project.walkthroughStartedAt + (project.walkthroughDuration || 0)
    : 0;

  return `
    ${renderHeader(project.name)}
    <div class="flex-1 scroll-y" id="main-content">
      <!-- Progress card -->

        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4">

              <p class="text-xs text-slate-400">${prog.reviewed} of ${prog.total} groups reviewed</p>
            </div>
            <div class="text-right">
              <p class="text-xl font-bold text-slate-900 tabular-nums">${fmt(getProjectTotal(project))}</p>
              ${started && duration > 60000 ? `<p class="text-xs text-slate-400">⏱ ${formatDuration(duration)}</p>` : ''}
            </div>
          </div>
          <!-- Progress bar (always on top, easy to read) -->
          <div class="flex items-center gap-2">
            <div class="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden">
              <div class="progress-bar-fill h-full bg-brand rounded-full" style="width:${prog.pct}%"></div>
            </div>
            <span class="text-xs font-bold text-slate-500 tabular-nums w-9 text-right">${prog.pct}%</span>
          </div>
          ${!started ? `<button onclick="startWalkthrough()" class="mt-3 w-full py-3 bg-brand rounded-xl text-sm font-bold text-white flex items-center justify-center gap-1.5">▶ Start Walkthrough</button>` : ''}
          ${started && crits.length > 0 ? `<button onclick="navigate('sparkcheck')" class="mt-3 w-full py-2 bg-red-50 rounded-xl text-xs font-semibold text-red-600 border border-red-100">⚠ ${crits.length} critical issue${crits.length > 1 ? 's' : ''} — tap to review</button>` : ''}
          ${started && prog.pct === 100 ? `<button onclick="navigate('export')" class="mt-3 w-full py-2.5 bg-brand rounded-xl text-sm font-bold text-white">Export Estimate →</button>` : ''}
        </div>
      </div>

      <!-- Room list -->
      <div class="px-4 pb-20 space-y-2 mt-2">
        ${project.rooms.map(room => {
          const rt = ROOM_TYPE_MAP[room.type];
          const groupsDone = room.groups.filter(g => g.reviewed).length;
          const total = room.groups.length;
          const roomTotal = room.groups.reduce((s, g) => s + g.items.reduce((t, i) => t + (i.qty||0)*(i.unitCost||0), 0), 0);
          const pct = total ? Math.round(groupsDone / total * 100) : 0;
          const roomIssues = issues.filter(i => i.roomId === room.id).length;
          const roomTypeIssues = issues.filter(i => i.roomType === room.type).length;
          const hasIssues = roomIssues + roomTypeIssues;
          const condColors = { good:'bg-green-100 text-green-700', fair:'bg-amber-100 text-amber-700', poor:'bg-red-100 text-red-700', gut:'bg-red-200 text-red-800' };
          return `
            <div onclick="setState({activeRoomId:'${room.id}',view:'room-groups'})"
              class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
              <div class="p-4">
                <div class="flex items-center gap-3">
                  <span class="text-2xl">${rt?.icon || '🏠'}</span>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                      <p class="font-semibold text-slate-900 text-sm">${esc(room.label)}</p>
                      ${room.condition ? `<span class="text-xs px-2 py-0.5 rounded-full font-medium ${condColors[room.condition] || 'bg-slate-100 text-slate-600'}">${room.condition}</span>` : ''}
                      ${hasIssues ? `<span class="text-xs text-red-500 font-semibold">⚠ ${hasIssues}</span>` : ''}
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                      <div class="flex-1 h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-brand rounded-full progress-bar-fill" style="width:${pct}%"></div>
                      </div>
                      <span class="text-xs text-slate-400 tabular-nums">${groupsDone}/${total}</span>
                    </div>
                  </div>
                  <div class="text-right flex-shrink-0">
                    ${roomTotal > 0 ? `<p class="text-sm font-bold text-slate-900 tabular-nums">${fmt(roomTotal)}</p>` : ''}
                    <p class="text-xs text-brand font-semibold mt-0.5">›</p>
                  </div>
                </div>
              </div>
            </div>`;
        }).join('')}

        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden mt-4">
          <div class="flex">
            <button onclick="navigate('room-setup')" class="flex-1 py-3 text-sm text-brand font-semibold border-r border-slate-100">+ Edit Rooms</button>
            <button onclick="navigate('export')" class="flex-1 py-3 text-sm text-slate-600 font-semibold">Export →</button>
          </div>
        </div>
      </div>
    </div>
    ${renderBottomNav()}`;
}

// ── ROOM GROUPS ──

function renderRoomGroups() {
  const project = activeProject();
  const room = project ? getRoomById(project, state.activeRoomId) : null;
  if (!room) return renderWalkthrough();
  const rt = ROOM_TYPE_MAP[room.type];
  const roomTotal = room.groups.reduce((s, g) => s + g.items.reduce((t, i) => t + (i.qty||0)*(i.unitCost||0), 0), 0);
  const condColors = { good:'bg-green-100 text-green-700', fair:'bg-amber-100 text-amber-700', poor:'bg-red-100 text-red-700', gut:'bg-red-200 text-red-800' };
  const condOpts = ['good','fair','poor','gut'];

  return `
    ${renderHeader(room.label, false, true, 'walkthrough')}
    <div class="flex-1 scroll-y" id="main-content">
      <div class="px-4 pt-4 pb-24 fade-in">
        <!-- Condition Scoring -->

          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Room Condition</p>
          <div class="flex gap-2">
            ${condOpts.map(c => `
              <button onclick="setRoomCondition('${project.id}','${room.id}','${c}')"
                class="flex-1 py-2 rounded-xl border-2 text-xs font-semibold transition-colors capitalize
                ${room.condition === c ? (condColors[c] + ' border-current') : 'border-slate-200 text-slate-500'}">
                ${c}
              </button>`).join('')}
          </div>
        </div>

        <!-- Room Notes -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 mb-3">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Room Notes</p>
          <textarea
            placeholder="Add notes for ${esc(room.label)} — e.g. water stain on ceiling, tenant belongings, access issues…"
            rows="2"
            class="w-full border-2 border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:border-brand text-slate-900 resize-none leading-snug"
            onchange="setRoomNotes('${project.id}','${room.id}',this.value)"
          >${esc(room.notes || '')}</textarea>
        </div>

        <!-- Group list -->
        <div class="space-y-2">
          ${room.groups.map(g => {
            const gDef = GROUPS[g.key];
            const gTotal = g.items.reduce((s, i) => s + (i.qty||0)*(i.unitCost||0), 0);
            const issues = runSparkCheck(project).filter(i => i.groupKey === g.key && (i.roomId === room.id || i.roomType === room.type));
            let statusBadge = '';
            if (g.noActionNeeded) statusBadge = `<span class="text-xs text-green-600 font-semibold">✓ NAN</span>`;
            else if (g.items.length > 0) statusBadge = `<span class="text-xs text-brand font-semibold">${g.items.length} item${g.items.length > 1 ? 's' : ''}</span>`;
            else if (g.reviewed) statusBadge = `<span class="text-xs text-green-600 font-semibold">✓</span>`;
            const riskColor = gDef?.riskLevel === 'critical' ? 'border-l-4 border-l-red-400' : gDef?.riskLevel === 'high' ? 'border-l-4 border-l-amber-400' : '';
            return `
              <div onclick="setState({activeRoomId:'${room.id}',activeGroupKey:'${g.key}',view:'group-detail'})"
                class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden ${riskColor}">
                <div class="p-4 flex items-center gap-3">
                  <div class="flex-1 min-w-0">

// ── GROUP DETAIL ──

function renderGroupDetail() {
  const project = activeProject();
  const room = project ? getRoomById(project, state.activeRoomId) : null;
  const groupState = room ? getGroupState(room, state.activeGroupKey) : null;
  if (!groupState || !project) return renderWalkthrough();
  const gDef = GROUPS[state.activeGroupKey];
  const catalogItemIds = gDef?.itemIds || [];
  const groupTotal = groupState.items.reduce((s, i) => s + (i.qty||0)*(i.unitCost||0), 0);
  const hasProfiles = QUICK_PROFILES[state.activeGroupKey]?.length > 0;

  // Photos for this group
  const allPhotos = [...(groupState.groupPhotos || [])];
  groupState.items.forEach(item => { allPhotos.push(...(item.photos || []).map(p => ({ ...p, _itemId: item.id, _itemName: item.name }))); });

  return `
    ${renderHeader(`${room.label} › ${gDef?.label || state.activeGroupKey}`, false, true, 'room-groups')}
    <div class="flex-1 scroll-y" id="main-content">
      <div class="pb-24 fade-in">

        <!-- NAN + Quick Profiles bar -->
        <div class="px-4 pt-4 flex gap-2 mb-1">

            class="flex-1 py-2.5 rounded-xl border-2 text-sm font-semibold transition-colors
            ${groupState.noActionNeeded ? 'bg-green-50 border-green-400 text-green-700' : 'border-slate-200 text-slate-500'}">
            ${groupState.noActionNeeded ? '✓ No Action Needed' : '✓ No Action Needed'}
          </button>
          ${hasProfiles ? `<button onclick="openProfilesModal('${state.activeGroupKey}')" class="px-4 py-2.5 rounded-xl border-2 border-brand/30 text-brand text-sm font-semibold">⚡ Quick</button>` : ''}
        </div>

        ${gDef?.riskLevel === 'critical' ? `<div class="mx-4 mb-1 p-3 bg-red-50 rounded-xl border border-red-100"><p class="text-xs text-red-600 font-medium">⚠ Critical group — this must be reviewed on every walkthrough</p></div>` : ''}

        <!-- Item list -->
        <div class="mx-4 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden mt-2 mb-3">
          ${catalogItemIds.length === 0 && groupState.items.length === 0 ? `<p class="text-xs text-slate-400 text-center py-6 px-4">No standard items for this room. Use <span class="text-brand font-semibold">Add Custom Item</span> below to add repairs.</p>` : ''}
          ${catalogItemIds.map(catId => {
            const cat = CATALOG[catId];
            if (!cat) return '';
            const selected = getSelectedCatalogItem(groupState, catId);
            const eff = getEffectivePrice(catId, project);

                    </div>
                    ${selected ? `
                      <div class="mt-2 flex items-center gap-2">
                        <div class="flex items-center gap-1.5 bg-slate-50 rounded-xl px-3 py-1.5 border border-slate-100">
                          <span class="text-xs text-slate-400">Qty</span>

                            oninput="liveUpdateTotal('${selected.id}','${selected.unitCost||0}',this.value)"
                          />
                          <span class="text-xs text-slate-400">${esc(cat.unit)}</span>
                        </div>
                        ${cat.hasYear ? `<input type="number" inputmode="numeric" value="${selected.year||''}" placeholder="Year"
                          class="w-20 text-sm text-center border border-slate-200 rounded-xl px-2 py-1.5 focus:border-brand"
                          onchange="handleYearChange('${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}',this.value)" />` : ''}
                        <label class="ml-auto cursor-pointer">
                          <span class="w-8 h-8 bg-slate-100 rounded-xl flex items-center justify-center text-base">📷</span>
                          <input type="file" accept="image/*" capture="environment" class="hidden"
                            onchange="handlePhotoCapture(event,'${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}')" />
                        </label>
                        <button onclick="handleDeleteItem('${project.id}','${room.id}','${state.activeGroupKey}','${selected.id}')"
                          class="w-8 h-8 bg-red-50 rounded-xl flex items-center justify-center text-red-400 text-xs font-bold">✕</button>
                      </div>
                      ${selected.serialNumber ? `<p class="mt-1.5 text-xs text-brand font-semibold">🔑 S/N: ${esc(selected.serialNumber)}</p>` : ''}

                      <input type="text" value="${esc(selected.notes || '')}" placeholder="Add a note (optional)…"
                        class="mt-2 w-full text-xs text-slate-600 bg-slate-50 border border-slate-100 rounded-lg px-3 py-2 focus:outline-none focus:border-brand placeholder:text-slate-300"

              <div class="border-b border-slate-50 last:border-b-0 bg-orange-50/30">
                <div class="flex items-start gap-3 px-4 py-3.5">
                  <div class="mt-0.5 w-5 h-5 rounded-md bg-brand border-brand border-2 flex items-center justify-center flex-shrink-0">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="white"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="2" fill="none"/></svg>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex justify-between gap-2">

                        <span class="text-xs text-slate-400">Qty</span>

            ${allPhotos.length > 0 ? `
              <div class="flex gap-2 flex-wrap">

                  <button onclick="openLightbox('${ph.dataUrl}','${project.id}','${room.id}','${state.activeGroupKey}','${ph._itemId || 'group'}','${ph.id}')"
                    class="w-16 h-16 rounded-xl overflow-hidden border border-slate-200 flex-shrink-0 relative">
                    <img src="${ph.dataUrl}" class="w-full h-full object-cover" />
                    ${ph._itemName ? `<div class="absolute bottom-0 left-0 right-0 bg-black/50 text-white text-[7px] px-1 py-0.5 truncate">${esc(ph._itemName.substring(0,12))}</div>` : ''}

          </div>
        </div>

        <!-- Group total + navigation -->
        ${groupTotal > 0 ? `<div class="mx-4 mb-3 p-4 bg-orange-50 rounded-2xl flex justify-between items-center border border-orange-100">
          <span class="text-sm font-semibold text-orange-800">${esc(gDef?.label || '')} Total</span>

        </div>` : ''}

        <div class="px-4">
          <button onclick="goNextGroup()" class="w-full py-3.5 bg-brand text-white font-bold rounded-2xl text-sm">

function goNextGroup() {
  const project = activeProject();
  const room = project ? getRoomById(project, state.activeRoomId) : null;
  if (!room) { navigate('walkthrough'); return; }
  const gIdx = room.groups.findIndex(g => g.key === state.activeGroupKey);
  if (gIdx < room.groups.length - 1) {
    const nextKey = room.groups[gIdx + 1].key;
    setState({ activeGroupKey: nextKey });
  } else {
    navigate('room-groups');
  }
}

// ── SPARKCHECK ──

function renderSparkCheck() {
  const project = activeProject();
  if (!project) return renderNeedsProject();
  const issues = runSparkCheck(project);
  const crits = issues.filter(i => i.level === 'critical');
  const warns = issues.filter(i => i.level === 'warning');
  const infos = issues.filter(i => i.level === 'info');

  const levelConfig = {
    critical: { label:'Critical', color:'text-red-600', bg:'bg-red-50', border:'border-red-200', icon:'🔴' },
    warning:  { label:'Warning',  color:'text-amber-600', bg:'bg-amber-50', border:'border-amber-200', icon:'🟡' },
    info:     { label:'Info',     color:'text-sky-600', bg:'bg-sky-50', border:'border-sky-200', icon:'🔵' },
  };

  const renderGroup = (list, level) => {
    if (!list.length) return '';
    const cfg = levelConfig[level];
    return `
      <div class="mb-3">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-wide px-4 mb-2">${cfg.icon} ${cfg.label} (${list.length})</p>
        <div class="px-4 space-y-2">
          ${list.map(issue => {
            const hasLink = issue.roomId || issue.roomType;
            return `
              <div class="${cfg.bg} rounded-2xl border ${cfg.border} p-4 ${hasLink ? 'cursor-pointer' : ''}"
                ${hasLink ? `onclick="navigateToIssue('${issue.roomId||''}','${issue.roomType||''}','${issue.groupKey||''}')"` : ''}>
                <p class="text-sm font-medium ${cfg.color} leading-snug">${esc(issue.msg)}</p>
                ${hasLink ? `<p class="text-xs ${cfg.color} opacity-60 mt-1">Tap to go there →</p>` : ''}
              </div>`;
          }).join('')}
        </div>
      </div>`;
  };

  return `
    ${renderHeader('SparkCheck')}
    <div class="flex-1 scroll-y" id="main-content">
      <div class="px-4 pt-4 pb-24 fade-in">
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 mb-4">
          <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl
              ${crits.length > 0 ? 'bg-red-100' : warns.length > 0 ? 'bg-amber-100' : 'bg-green-100'}">
              ${crits.length > 0 ? '⚠️' : warns.length > 0 ? '⚡' : '✅'}
            </div>
            <div>
              <p class="font-bold text-slate-900 text-base">
                ${issues.length === 0 ? 'All Clear' : `${issues.length} Issue${issues.length > 1 ? 's' : ''} Found`}
              </p>
              <p class="text-xs text-slate-400 mt-0.5">
                ${crits.length} critical · ${warns.length} warnings · ${infos.length} info
              </p>
            </div>
          </div>
          ${issues.length === 0 ? `<p class="mt-3 text-sm text-green-600 font-medium">Your estimate looks complete and credible. Ready to export!</p>` : ''}
        </div>

        ${renderGroup(crits, 'critical')}
        ${renderGroup(warns, 'warning')}
        ${renderGroup(infos, 'info')}

        ${issues.length > 0 ? `
          <div class="mt-4 px-0">
            <button onclick="navigate('export')" class="w-full py-3.5 bg-brand text-white font-bold rounded-2xl text-sm">
              Export Anyway →
            </button>
          </div>` : `
          <div class="mt-4">
            <button onclick="navigate('export')" class="w-full py-3.5 bg-brand text-white font-bold rounded-2xl text-sm">
              Export Estimate →
            </button>
          </div>`}
      </div>
    </div>
    ${renderBottomNav()}`;
}

function navigateToIssue(roomId, roomType, groupKey) {
  const project = activeProject();
  if (!project) return;
  let targetRoomId = roomId;
  if (!targetRoomId && roomType) {
    const room = project.rooms.find(r => r.type === roomType);
    if (room) targetRoomId = room.id;
  }
  if (!targetRoomId) return;
  if (groupKey) {
    setState({ activeRoomId: targetRoomId, activeGroupKey: groupKey, view: 'group-detail' });
  } else {
    setState({ activeRoomId: targetRoomId, view: 'room-groups' });
  }
}

// ── DEAL ANALYZER ──

function renderDealAnalyzer() {
  const project = activeProject();
  if (!project) return renderNeedsProject();
  const da = project.dealAnalyzer || {};
  const deal = analyzeDeal(project);
  const confColors = { green:'bg-green-500', yellow:'bg-amber-400', red:'bg-red-500' };
  const confLabels = { green:'🟢 Green — Deal looks strong', yellow:'🟡 Yellow — Thin margin, proceed carefully', red:'🔴 Red — Deal does not pencil' };

  // Sensitivity: how much more can repair cost before deal goes red?
  const buffer = deal ? (deal.redThreshold - deal.repair) : 0;

  return `
    ${renderHeader('Deal Analyzer')}
    <div class="flex-1 scroll-y" id="main-content">
      <div class="px-4 pt-4 pb-24 fade-in">

        ${deal && da.arv > 0 ? `
          <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 mb-4">
            <div class="w-full h-12 rounded-xl flex items-center justify-center text-white font-bold text-sm mb-3 ${confColors[deal.confidence]}">
              ${confLabels[deal.confidence]}
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-slate-50 rounded-xl p-3">
                <p class="text-xs text-slate-400">Max Offer</p>
                <p class="text-xl font-bold text-slate-900 tabular-nums">${fmt(deal.maxOffer)}</p>
              </div>
              <div class="bg-slate-50 rounded-xl p-3">
                <p class="text-xs text-slate-400">Est. Profit</p>
                <p class="text-xl font-bold ${deal.estimatedProfit >= 0 ? 'text-green-600' : 'text-red-600'} tabular-nums">${fmt(deal.estimatedProfit)}</p>
              </div>
            </div>
            ${buffer !== 0 ? `
              <div class="mt-3 p-3 ${buffer > 0 ? 'bg-green-50 border border-green-100' : 'bg-red-50 border border-red-100'} rounded-xl">
                <p class="text-xs font-semibold ${buffer > 0 ? 'text-green-700' : 'text-red-700'}">
                  ${buffer > 0 
                    ? `Deal stays green if repairs stay under ${fmt(deal.repair + buffer)} (${fmt(buffer)} buffer)`
                    : `Repairs already exceed max by ${fmt(Math.abs(buffer))}`}
                </p>
              </div>` : ''}
          </div>
        ` : ''}

        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 mb-4">
          <h3 class="font-semibold text-slate-800 mb-4">Deal Numbers</h3>
          <div class="space-y-3">
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">ARV</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.arv||''}" placeholder="0"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('arv',this.value)" />
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Purchase Price</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.purchasePrice||''}" placeholder="0"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('purchasePrice',this.value)" />
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Repair Estimate</label>
              <div class="flex-1 flex items-center border-2 border-slate-100 bg-slate-50 rounded-xl overflow-hidden">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <span class="flex-1 py-2.5 text-sm font-bold text-brand tabular-nums">${(getProjectTotal(project)||0).toFixed(2)}</span>
                <span class="px-3 text-xs text-slate-400">auto</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Target Profit</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.targetProfit||30000}" placeholder="30000"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('targetProfit',this.value)" />
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Holding Costs</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.holdingCosts||18000}" placeholder="18000"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('holdingCosts',this.value)" />
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="text-sm text-slate-600 w-36 flex-shrink-0">Selling Costs</label>
              <div class="flex-1 flex items-center border-2 border-slate-200 rounded-xl overflow-hidden focus-within:border-brand">
                <span class="px-3 text-slate-400 text-sm">$</span>
                <input type="number" inputmode="decimal" value="${da.sellingCosts||0}" placeholder="0"
                  class="flex-1 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none"
                  onchange="saveDealField('sellingCosts',this.value)" />
              </div>
            </div>
          </div>
        </div>

        <p class="text-xs text-slate-400 text-center mb-4">Formula: Max Offer = ARV − Repairs − Target Profit − Holding − Selling</p>
      </div>
    </div>
    ${renderBottomNav()}`;
}

function saveDealField(field, value) {
  const project = activeProject();
  if (!project) return;
  updateProject(project.id, p => {
    if (!p.dealAnalyzer) p.dealAnalyzer = {};
    p.dealAnalyzer[field] = parseFloat(value) || 0;
  });
  render();
}

  return `
    ${renderHeader('Export', false, true, 'walkthrough')}
    <div class="flex-1 scroll-y" id="main-content">
      <div class="px-4 pt-4 pb-24 fade-in">

            <div class="flex justify-between py-2 border-b border-slate-50">

              <span class="font-semibold text-slate-700">${prog.pct}% (${prog.reviewed}/${prog.total} groups)</span>
            </div>
            ${crits.length > 0 ? `<div class="flex justify-between py-2 border-b border-slate-50">
              <span class="text-red-500 font-medium">⚠ Critical Issues</span>

              <div class="flex justify-between py-2 border-b border-slate-50">

                <span class="font-bold text-slate-900 tabular-nums">${fmt(deal.maxOffer)}</span>

              <div class="flex justify-between py-2">
                <span class="text-slate-500">Deal Confidence</span>
                <span class="font-bold capitalize ${deal.confidence === 'green' ? 'text-green-600' : deal.confidence === 'yellow' ? 'text-amber-600' : 'text-red-600'}">${deal.confidence}</span>
              </div>` : ''}
          </div>
        </div>

function sortRoomsByOrder(p) {
  p.rooms.sort((a, b) =>

}

function addRoomOfType(projectId, type) {
  updateProject(projectId, p => {
    const rt = ROOM_TYPE_MAP[type];
    if (!rt) return;
    let label;
    if (rt.multi) {
      const count = p.rooms.filter(r => r.type === type).length + 1;
      label = `${rt.label} ${count}`;
    } else {
      if (p.rooms.some(r => r.type === type)) return; // single-instance already exists
      label = rt.label;
    }
    p.rooms.push(createRoom(type, label, p.rooms.length));
    sortRoomsByOrder(p);
  });
  render();
}

function addCustomRoom(projectId, name) {

  if (!nm) return;
  updateProject(projectId, p => {

  render();

async function handlePhotoCapture(event, projectId, roomId, groupKey, lineItemIdOrGroup) {
  const file = event.target.files?.[0];
  if (!file) return;
  event.target.value = '';
  const dataUrl = await compressPhoto(file);
  const photo = { id: uid(), dataUrl, caption: '', ocrText: null, serialNumber: null };

  // Check if this item has hasYear (needs OCR attempt)
  const project = state.projects.find(p => p.id === projectId);
  const room = project ? getRoomById(project, roomId) : null;
  const g = room ? getGroupState(room, groupKey) : null;
  const item = g ? getLineItemById(g, lineItemIdOrGroup) : null;
  const catItem = item?.catalogId ? CATALOG[item.catalogId] : null;
  const needsOCR = catItem?.hasYear;

  if (lineItemIdOrGroup === 'group') {
    addPhotoToGroup(projectId, roomId, groupKey, photo);
  } else {
    addPhotoToItem(projectId, roomId, groupKey, lineItemIdOrGroup, photo);
  }

  render();

  if (needsOCR) {
    // Attempt OCR regardless of connection status: if Tesseract's script/worker
    // assets were already cached (by the service worker or browser HTTP cache)
    // from a prior online session, this still works offline. It fails silently
    // if the assets aren't available yet.
    setTimeout(async () => {
      const text = await runOCR(dataUrl);
      const serial = parseSerial(text);
      if (serial || text?.length > 3) {
        openOcrModal(serial || text?.trim().substring(0, 40), projectId, roomId, groupKey, lineItemIdOrGroup, photo.id);
      }
    }, 500);
  }
}

  if (!name) { document.getElementById('ci-name')?.focus(); return; }
  if (!_customCtx) return;
  updateProject(_customCtx.projectId, p => {
    updateGroupStateIn(p, _customCtx.roomId, _customCtx.groupKey, g => {
      g.items.push({ id: uid(), catalogId: null, name, qty, unitCost: cost, unit, notes: '', photos: [], year: null, serialNumber: null, isCustom: true });
      g.reviewed = true;
    });
  });
  closeCustomModal();
  render();
}

// ── Quick Profiles Modal ──

let _profileGroupKey = null;
function openProfilesModal(groupKey) {
  _profileGroupKey = groupKey;
  const profiles = QUICK_PROFILES[groupKey] || [];
  const list = document.getElementById('profiles-list');
  list.innerHTML = profiles.map((prof, idx) => {
    const previewTotal = prof.items.reduce((s, item) => {
      const cat = CATALOG[item.id];
      const eff = getEffectivePrice(item.id, activeProject());
      return s + (item.qty || 1) * eff;
    }, 0);
    return `
      <button onclick="applyProfile(${idx})"
        class="w-full text-left p-3.5 rounded-2xl border border-slate-100 mb-2 hover:border-brand/30 hover:bg-brand/5 transition-colors">
        <p class="font-semibold text-slate-900 text-sm">${esc(prof.name)}</p>
        <p class="text-xs text-slate-400 mt-0.5">${prof.items.length} items · est. ${fmt(previewTotal)}</p>
      </button>`;
  }).join('') || '<p class="text-sm text-slate-400 text-center py-4">No profiles for this group</p>';
  const modal = document.getElementById('profiles-modal');
  modal.classList.remove('hidden');
  setTimeout(() => document.getElementById('profiles-box').classList.add('open'), 10);
}
function closeProfilesModal() {
  document.getElementById('profiles-box').classList.remove('open');
  setTimeout(() => document.getElementById('profiles-modal').classList.add('hidden'), 300);
}
function applyProfile(idx) {
  const project = activeProject();
  if (!project || !_profileGroupKey) return;
  const profile = QUICK_PROFILES[_profileGroupKey]?.[idx];
  if (!profile) return;
  closeProfilesModal();
  updateProject(project.id, p => {
    const room = p.rooms.find(r => r.id === state.activeRoomId);
    if (!room) return;
    const g = room.groups.find(g => g.key === _profileGroupKey);
    if (!g) return;
    g.noActionNeeded = false;
    profile.items.forEach(({ id: catId, qty }) => {
      const existing = g.items.find(i => i.catalogId === catId);
      if (existing) { existing.qty = qty; }
      else {
        const cat = CATALOG[catId];
        if (!cat) return;
        const eff = getEffectivePrice(catId, p);
        g.items.push({ id: uid(), catalogId: catId, name: cat.name, qty, unitCost: eff, unit: cat.unit, notes: '', photos: [], year: null, serialNumber: null, isCustom: false });
      }
    });
    g.reviewed = g.items.length > 0;
  });
  render();
}

// ── Price CSV Upload ──

function handlePriceCSV(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').map(l => l.trim()).filter(Boolean);
    let updated = 0;
    lines.slice(1).forEach(line => {
      const [id, , cost] = line.split(',').map(s => s.replace(/"/g, '').trim());
      const num = parseFloat(cost);
      if (id && !isNaN(num) && CATALOG[id]) {
        state.globalPriceOverrides[id] = num;
        applyGlobalPriceToProjects(id, num);
        updated++;
      }
    });
    saveState();
    render();
    alert(`Updated ${updated} prices from CSV.`);
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Rolls a global price change out to every already-selected line item
// across all projects, unless that project has its own per-project
// override for the same catalog item (project overrides always win).
function applyGlobalPriceToProjects(itemId, newPrice) {
  state.projects.forEach(project => {
    if (project.priceOverrides?.[itemId] !== undefined) return;
    let touched = false;
    project.rooms.forEach(room => {
      room.groups.forEach(g => {
        g.items.forEach(item => {
          if (item.catalogId === itemId) { item.unitCost = newPrice; touched = true; }
        });
      });
    });
    if (touched) project.updatedAt = Date.now();
  });
}

function resetGlobalPrices() {
  openConfirm('Reset Prices', 'Reset all global price overrides to defaults? Per-project overrides are not affected.', 'Reset', 'bg-red-500', () => {
    state.globalPriceOverrides = {};
    saveState();
    render();
  });
}

// ── Backup / Restore ──

function backupData() {
  const backup = JSON.stringify({ projects: state.projects, globalPriceOverrides: state.globalPriceOverrides, version: 2, date: new Date().toISOString() }, null, 2);
  const blob = new Blob([backup], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `spark-estimator-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function restoreData(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    openConfirm('Restore Backup', 'This will overwrite all current projects with the backup. Continue?', 'Restore', 'bg-brand', () => {
      try {
        const data = JSON.parse(e.target.result);
        state.projects = data.projects || [];
        state.globalPriceOverrides = data.globalPriceOverrides || {};
        state.activeProjectId = state.projects[0]?.id || null;
        saveState();
        navigate('dashboard');
        alert('Backup restored successfully.');
      } catch(err) {
        alert('Failed to restore backup: ' + err.message);
      }
    });
  };
  reader.readAsText(file);
  event.target.value = '';
}

loadState();
render();
